<title>Summary Matching — Our Fascination with Dragons</title>

<style>

.cover-card .brand-mark { display: inline-flex; align-items: center; justify-content: center; width: 60px; height: 60px; background: var(--jk-navy); color: #fff; font-family: 'Lora', Georgia, serif; font-weight: 700; font-size: 26px; border-radius: 6px; margin: 0 auto 18px; position: relative; }

.cover-actions button.secondary { background: #e5e8ec; color: #1a1a1a; }

.name-input { width: 100%; font-size: 17px; padding: 13px 14px; border: 2px solid var(--border); border-radius: 3px; margin-bottom: 8px; text-align: center; }
.name-input:focus { outline: none; border-color: var(--jk-navy); }

.results-card h1 { font-family: 'Lora', Georgia, serif; font-size: 26px; margin-bottom: 6px; color: var(--jk-navy); }
.results-card .student-line { font-size: 14px; color: #555; margin-bottom: 20px; }
.score-display { display: flex; justify-content: center; align-items: baseline; gap: 14px; margin-bottom: 6px; }
.score-display .score { font-size: 60px; font-weight: 700; color: var(--jk-navy); line-height: 1; }
.score-display .total { font-size: 30px; color: #888; font-weight: 500; }
.score-pct { font-size: 20px; font-weight: 600; color: var(--jk-gold); margin-bottom: 8px; }
.score-time { font-size: 13px; color: #666; margin-bottom: 24px; }
.results-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.results-actions button { background: var(--jk-navy); color: #fff; padding: 11px 22px; font-size: 14.5px; font-weight: 600; border-radius: 3px; min-width: 130px; }
.results-actions button:hover { background: var(--jk-navy-dark); }
.results-actions button.secondary { background: #e5e8ec; color: #1a1a1a; }
.results-actions button.secondary:hover { background: #d8dde2; }
.upload-status { margin-top: 16px; font-size: 13px; color: #666; }
.upload-status.success { color: var(--correct-green); }
.upload-status.error { color: var(--wrong-red); }

.review-banner { background: var(--jk-navy); color: #fff; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; flex-shrink: 0; }
.review-banner .info { display: flex; gap: 18px; align-items: center; }
.review-banner .badge { background: rgba(255,255,255,0.18); padding: 5px 12px; border-radius: 12px; font-weight: 700; font-size: 12px; }
.review-banner button { background: rgba(255,255,255,0.18); color: #fff; padding: 7px 14px; font-size: 13px; font-weight: 600; border-radius: 3px; border: 1px solid rgba(255,255,255,0.35); }
.review-banner button:hover { background: rgba(255,255,255,0.28); }
.review-row { background: #fff; padding: 16px 20px; border-radius: 6px; margin-bottom: 14px; border-left: 4px solid var(--jk-navy); }
.review-row.correct { border-left-color: var(--correct-green); background: #f0fdf4; }
.review-row.wrong { border-left-color: var(--wrong-red); background: #fef2f2; }
.review-row .header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
.review-row .gap-num { font-weight: 700; color: var(--jk-navy); font-size: 14px; }
.review-row .review-status { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 10px; letter-spacing: 0.4px; }
.review-row .review-status.correct { background: var(--correct-green); color: #fff; }
.review-row .review-status.wrong { background: var(--wrong-red); color: #fff; }
.review-row .answer-line { font-size: 13px; margin-bottom: 4px; line-height: 1.4; }
.review-row .user-ans { color: var(--wrong-red); }
.review-row .correct-ans { color: var(--correct-green); }
.solution-toggle-btn { background: var(--jk-gold); color: #1a1a1a; font-weight: 700; padding: 8px 14px; font-size: 12.5px; border-radius: 3px; margin-top: 8px; }
.solution-toggle-btn:hover { background: #b89348; }
.solution-panel { margin-top: 10px; background: #fffbeb; border: 1px solid var(--jk-gold); border-radius: 4px; padding: 12px 14px; font-size: 12.5px; line-height: 1.55; }
.solution-panel h4 { font-size: 11.5px; font-weight: 700; color: var(--jk-navy); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.solution-panel p { margin-bottom: 8px; }
.solution-panel .why-not strong { color: var(--wrong-red); }

@media (max-width: 900px) {
  .pane-left, .pane-right-inner { padding: 16px 16px; }
  .center-cluster { min-width: 200px; padding: 8px 14px; }
  .center-cluster .q-title { font-size: 14px; }
  .top-bar { height: 64px; }
  .timer-digits .num { font-size: 20px; }
  .jk-logo .text { display: none; }
  .slot-row { grid-template-columns: 80px 1fr; }
  .slot-label { font-size: 11.5px; padding-left: 4px; }
}

<script>
const GOOGLE_SHEETS_URL = 'https://script.google.com/macros/s/AKfycbx9ti79N2BDMVrxOZFwx9BjH4Ihawb5p5A3nko2oQQIoTaIL0NW7AVlx8rys1Kww5LcsQ/exec';

const TEST_META = {
  testId: 'TestDay-Summary-Dragons',
  title: 'Summary Matching',
  topic: 'Our Fascination with Dragons',
  durationSeconds: 540,
  totalQuestions: 6
};

const PASSAGE = {
  title: 'Our Fascination with Dragons',
  paragraphs: [
    { letter: 'A', qNum: 15, correctOption: 'D',
      text: `Dragons, the great winged or serpentine beasts of legend, are actually more than one creature. There is the dragon of Western tradition — a fire-breathing monster hoarding gold and terrorising villages — and there is the dragon of East Asian belief, a wise and benevolent bringer of rain and good fortune. Across India, the Americas, and the Middle East, still other dragons exist, each shaped by the imagination of the culture that gave it life.`,
      solution: { evidence: "'actually more than one creature' signals plural perceptions. The paragraph explicitly contrasts 'the dragon of Western tradition' with 'the dragon of East Asian belief', and adds 'each shaped by the imagination of the culture that gave it life.' This is the cross-cultural-perception thesis paragraph.",
        whyNot: "<strong>G</strong> mentions 'tradition' but the focus is contrast across cultures, not significance to ancient societies. <strong>A</strong> mentions imagination but spans all of history, not the 20th century. <strong>E</strong> requires a shift in portrayal — but this paragraph describes co-existing differences, not a change." } },
    { letter: 'B', qNum: 16, correctOption: 'G',
      text: `Dragons are creatures which have appeared in the myths of nearly every ancient civilisation. The Mesopotamians told stories of Tiamat, a primordial dragon-goddess of the salt sea whose body was said to have been split to form the heavens and the earth. The ancient Egyptians feared Apep, a giant serpent who tried each night to swallow the sun god Ra and was driven back only by the chants of priests. In ancient China, the dragon was so revered that emperors adopted it as their personal emblem; the imperial throne was called the Dragon Throne, and the emperor's face the Dragon Face.`,
      solution: { evidence: "Three 'earlier human societies' explicitly named: Mesopotamians, Egyptians, ancient Chinese. Direct evidence of significance: 'so revered that emperors adopted it as their personal emblem' and 'driven back only by the chants of priests'.",
        whyNot: "<strong>A</strong> — mythology can sound like 'popular culture' but the paragraph is firmly set in ancient times, no 20th-century material. <strong>D</strong> — different cultures appear, but the focus is each culture's reverence/fear, not the contrast between perceptions. <strong>F</strong> — no geographical assumption is made." } },
    { letter: 'C', qNum: 17, correctOption: 'B',
      text: `Eventually, people began shifting from purely mythological accounts of dragons to attempts at careful description. The development of the printing press in the 1400s enabled European scholars to compile and circulate the first widely-read bestiaries — encyclopaedic books cataloguing both real and imagined animals. In 1551, the Swiss naturalist Conrad Gessner produced one of the first systematic studies of dragons in his Historia Animalium, drawing detailed illustrations and recording supposed eyewitness accounts gathered from travellers across Europe and Asia.`,
      solution: { evidence: "'The development of the printing press in the 1400s enabled European scholars' = new technology + facilitation. 'first widely-read bestiaries' = earliest documented descriptions. Conrad Gessner produced 'one of the first systematic studies' — exact match.",
        whyNot: "<strong>D</strong> — 'shifting from mythological to careful description' could suggest changing perceptions, but the paragraph's structural function is the technology that made documentation possible. <strong>G</strong> — sixteenth-century Europeans are not 'earlier human societies' in the ancient-civilisations sense. <strong>C</strong> — Gessner's accounts were 'supposed' eyewitness, not scientific evidence of real dragons." } },
    { letter: 'D', qNum: 18, correctOption: 'F',
      text: `In the 1500s, European cartographers often marked the unexplored edges of their maps with the Latin phrase HC SVNT DRACONES — meaning 'here be dragons' — a warning that fearsome creatures awaited any traveller who ventured beyond. The phrase, famously inscribed on the Hunt-Lenox Globe of around 1510, led many to mistakenly believe that distant regions of Africa and Asia were genuinely populated by monsters. Once those territories were properly explored and mapped, of course, no dragons were ever found.`,
      solution: { evidence: "'unexplored edges of their maps' = geographical region. 'mistakenly believe that distant regions of Africa and Asia were genuinely populated by monsters' = inaccurate assumption. 'no dragons were ever found' = confirms inaccuracy.",
        whyNot: "<strong>C</strong> — 'here be dragons' is the OPPOSITE of evidence — it is an assumption that was disproved. The word 'recent' in C is also wrong (this is the 1500s). <strong>B</strong> — cartography is technology-adjacent, but the focus is the wrong assumption. <strong>D</strong> — describes one shared mistaken European assumption, not multiple cultural perceptions." } },
    { letter: 'E', qNum: 19, correctOption: 'A',
      text: `Even after scholars dismissed the existence of dragons, the creatures' grip on the human imagination only tightened. Writers of the new genre of modern fantasy began to feature them in their stories. British author J.R.R. Tolkien's 1937 novel 'The Hobbit' depicted Smaug, a cunning fire-breathing dragon guarding a mountain of stolen treasure. The book caused a sensation and inspired generations of imitators. Anne McCaffrey's 1968 'Dragonriders of Pern' series presented dragons as bonded companions to human riders. For Hollywood filmmakers, dragons also became a popular subject for blockbuster films, such as the 1981 movie 'Dragonslayer'. There was even an animated television series, 'Dungeons & Dragons', which followed young heroes battling beasts in a fantasy realm.`,
      solution: { evidence: "All examples are 20th century: 1937, 1968, 1981 + animated TV series. 'new genre of modern fantasy' = entry into a popular cultural form. Multiple media types: novel + book series + film + television.",
        whyNot: "<strong>E</strong> — the paragraph mentions movies and books, but these are still fantastical, monstrous portrayals. The sympathetic shift happens in paragraph F. 'The reason why' is also wrong: paragraph E describes the era, not the reason for change. <strong>D</strong> — these are all Western pop-culture works, no cross-cultural comparison. <strong>B</strong> — no new technology is the focus." } },
    { letter: 'F', qNum: 20, correctOption: 'E',
      text: `All these older fantasies of dragons as enemies to be slain were challenged by the 2003 children's book 'How to Train Your Dragon' by British author Cressida Cowell, which reimagined dragons as misunderstood creatures capable of friendship. This and later cultural shifts toward environmental awareness seem to have influenced writers and filmmakers to change their depictions of dragons — not as monsters to be destroyed, but as intelligent beings to be befriended and protected. In more recent works such as the 2010 DreamWorks film adaptation of Cowell's book and the 2011 series 'Game of Thrones', dragons are depicted as complex, sympathetic creatures with their own social bonds, intelligence, and even tragic vulnerability.`,
      solution: { evidence: "Explicit causal language: 'challenged by the 2003 children's book' + 'cultural shifts have influenced writers and filmmakers to change their depictions'. The new mode: 'not as monsters to be destroyed, but as intelligent beings to be befriended and protected'. The keyword 'sympathetic' matches option E word-for-word.",
        whyNot: "<strong>A</strong> — these are also 20th/21st-century works, but the paragraph is structured around WHY portrayal changed, not the era of entry. Paragraph E already covered 'entering popular culture'. <strong>D</strong> — only one shift is described (fantasy → sympathetic). <strong>C</strong> — sympathetic fictional portrayals are not scientific evidence of real dragons." } }
  ]
};

const OPTIONS = [
  { letter: 'A', text: 'dragons entering twentieth-century popular culture' },
  { letter: 'B', text: 'how new technology facilitated the earliest documented descriptions of dragons' },
  { letter: 'C', text: 'recent scientific evidence for the existence of real dragons' },
  { letter: 'D', text: 'the idea that there are different perceptions of dragons across cultures' },
  { letter: 'E', text: 'the reason why dragons began to be portrayed more sympathetically in modern stories' },
  { letter: 'F', text: 'an assumption about a geographical region that was inaccurate' },
  { letter: 'G', text: 'the significance of dragons to earlier human societies' }
];
const EXTRA_OPTION = 'C';
const EXTRA_NOTE = "Option C (\"recent scientific evidence for the existence of real dragons\") is the unused distractor. The word 'recent' is decisive — every dated reference in the passage is historical (1400s, 1500s, 1937, 1968, 1981, 2003, 2010, 2011). The phrase 'real dragons' is decisive — paragraph D states 'no dragons were ever found,' and paragraph C calls accounts 'supposed.' The passage consistently treats dragons as imagined, never as scientifically verified.";

const STATE = {
  screen: 'name', studentName: '', startedAt: null, finishedAt: null,
  timerSeconds: TEST_META.durationSeconds, timerHidden: false,
  answers: {}, draggingOption: null, showSolution: {}, uploadStatus: 'pending'
};
let timerInterval = null;
const root = document.getElementById('app');

function render() {
  switch (STATE.screen) {
    case 'name': renderNameEntry(); break;
    case 'confirm': renderConfirm(); break;
    case 'test': renderTest(); break;
    case 'submitConfirm': renderTest(); renderSubmitModal(); break;
    case 'timeUp': renderTest(); renderTimeUpModal(); break;
    case 'submitted': renderResults(); break;
    case 'review': renderReview(); break;
  }
}

function jkLogo() {
  return `<div class="jk-logo"><div class="mark">JK</div><div class="text"><span class="l1">JK COACHING</span><span class="l2">COLLEGE</span></div></div>`;
}
function topBar() {
  let timerCls = '';
  if (STATE.timerSeconds <= 30) timerCls = 'danger';
  else if (STATE.timerSeconds <= 120) timerCls = 'warning';
  return `<div class="top-bar">
    <div class="left-cluster">
      <button class="zoom-btn" onclick="zoomToggle()">+</button>
      <div class="timer-block ${timerCls}">
        <div class="timer-digits" style="${STATE.timerHidden ? 'visibility:hidden' : ''}">${formatTimer()}</div>
        ${STATE.timerHidden ? '' : `<div class="timer-labels"><span>Hours</span><span>Mins</span><span>Secs</span></div>`}
      </div>
      <button class="hide-time-btn" onclick="toggleHideTime()">${STATE.timerHidden ? 'Show time' : 'Hide time'}</button>
    </div>
    <div class="center-cluster"><span class="q-title">${TEST_META.title} · Q15–20</span></div>
    <div class="right-cluster">${jkLogo()}</div>
  </div>`;
}
function topBarSimple(text) {
  return `<div class="top-bar">
    <div class="left-cluster"><button class="zoom-btn">+</button></div>
    <div class="center-cluster"><span class="q-title">${text}</span></div>
    <div class="right-cluster">${jkLogo()}</div>
  </div>`;
}

function renderNameEntry() {
  root.innerHTML = `${topBarSimple(TEST_META.title + ' · ' + TEST_META.topic)}
    <div class="cover-screen">
      <div class="cover-card">
        <div class="brand-mark">JK</div>
        <h1>JK Coaching College</h1>
        <div class="subtitle">${TEST_META.title} — ${TEST_META.topic}</div>
        <div class="question">Please enter your name to begin</div>
        <div class="sub">You will have <strong>9 minutes</strong>.<br>The text has six paragraphs (A–F). Drag each summary option (A–G) into the paragraph slot it best summarises. One option is extra.</div>
        <input type="text" class="name-input" id="nameInput" placeholder="e.g. Sarah Kim"
               value="${escapeHtml(STATE.studentName)}"
               oninput="STATE.studentName = this.value; document.getElementById('startBtn').disabled = !this.value.trim();"
               onkeypress="if(event.key === 'Enter' && this.value.trim()) goConfirm()">
        <div class="name-hint">${TEST_META.totalQuestions} questions · 9 minutes</div>
        <div class="cover-actions">
          <button id="startBtn" ${STATE.studentName.trim() ? '' : 'disabled'} onclick="goConfirm()">Continue</button>
        </div>
        <a href="../" class="back-link">← Back to home</a>
      </div>
    </div>`;
  setTimeout(() => document.getElementById('nameInput')?.focus(), 50);
}

function renderConfirm() {
  root.innerHTML = `${topBarSimple('')}
    <div class="cover-screen">
      <div class="cover-card">
        <div class="brand-mark">JK</div>
        <h1>${escapeHtml(STATE.studentName)}</h1>
        <div class="subtitle">${TEST_META.title} — ${TEST_META.topic}</div>
        <div class="question">Ready to begin?</div>
        <div class="sub">The timer (9 minutes) will start when you click Yes.<br>When time runs out the test is submitted automatically.</div>
        <div class="cover-actions">
          <button class="secondary" onclick="STATE.screen='name'; render();">No, go back</button>
          <button onclick="startTest()">Yes, start</button>
        </div>
      </div>
    </div>`;
}

function renderTest() {
  const passageHtml = PASSAGE.paragraphs.map(p =>
    `<div class="passage-para"><strong class="para-letter">${p.letter}</strong> ${escapeHtml(p.text)}</div>`
  ).join('');

  const placedSet = new Set(Object.values(STATE.answers));

  const optionsHtml = OPTIONS.map(opt => {
    const placed = placedSet.has(opt.letter);
    return `<div class="option-card ${placed ? 'placed' : ''}"
                 draggable="${placed ? 'false' : 'true'}"
                 data-letter="${opt.letter}"
                 ondragstart="optDragStart(event, '${opt.letter}')"
                 ondragend="optDragEnd(event)">${escapeHtml(opt.text)}</div>`;
  }).join('');

  const slotsHtml = PASSAGE.paragraphs.map(p => {
    const filled = STATE.answers[p.letter];
    let slotInner;
    if (filled) {
      const opt = OPTIONS.find(o => o.letter === filled);
      slotInner = `<span class="slot-letter">${filled}</span><span class="slot-content">${escapeHtml(opt.text)}</span><span class="slot-clear" onclick="clearSlot('${p.letter}'); event.stopPropagation();" title="Remove">✕</span>`;
    } else {
      slotInner = `<span class="slot-content" style="color:#94a3b8; font-style:italic;">Drop here</span>`;
    }
    return `<div class="slot-row">
      <div class="slot-label">Paragraph ${p.letter}</div>
      <div class="slot-target ${filled ? 'filled' : ''}"
           data-para="${p.letter}"
           ondragover="slotDragOver(event, '${p.letter}')"
           ondragleave="slotDragLeave(event)"
           ondrop="slotDrop(event, '${p.letter}')">${slotInner}</div>
    </div>`;
  }).join('');

  root.innerHTML = `${topBar()}
    <div class="content">
      <div class="pane-left">
        <div class="pane-instruction">Read the text below. The text has six paragraphs (A–F).</div>
        <div class="passage-title">${PASSAGE.title}</div>
        ${passageHtml}
      </div>
      <div class="pane-right">
        <div class="pane-right-inner">
          <div class="right-instruction">
            <p>Choose the option which best summarises each paragraph (A – F).</p>
            <p style="font-weight: 500; margin-top: 4px;">There is one extra option which you do not need to use.</p>
          </div>
          <div class="options-panel">${optionsHtml}</div>
          <div class="drag-hint">Drag each option down into the matching paragraph slot.</div>
          <div class="slot-panel">${slotsHtml}</div>
        </div>
      </div>
    </div>
    <div class="bottom-bar">
      <button class="btn btn-back" onclick="goHome()">← Home</button>
      <button class="btn btn-submit" onclick="goSubmit()">Submit ▸</button>
    </div>`;
}

function renderSubmitModal() {
  const unanswered = PASSAGE.paragraphs.filter(p => !STATE.answers[p.letter]).length;
  const modal = document.createElement('div');
  modal.className = 'modal-bg';
  modal.id = 'submitModal';
  modal.innerHTML = `<div class="modal-card">
    <h2>Submit your test?</h2>
    <p>${unanswered > 0 ? `You have <strong>${unanswered}</strong> unanswered paragraph${unanswered > 1 ? 's' : ''}.` : 'You have answered all paragraphs.'}<br>Once submitted, you cannot change your answers.</p>
    <div class="modal-actions">
      <button class="secondary" onclick="cancelSubmit()">Cancel</button>
      <button onclick="finalizeSubmit()">Submit</button>
    </div>
  </div>`;
  document.body.appendChild(modal);
}

function renderTimeUpModal() {
  const modal = document.createElement('div');
  modal.className = 'modal-bg';
  modal.id = 'timeUpModal';
  modal.innerHTML = `<div class="modal-card warning">
    <h2>⏰ Time's up!</h2>
    <p>The 9 minutes are over. Your test will be submitted automatically.</p>
    <div class="modal-actions"><button onclick="finalizeSubmit()">View Results</button></div>
  </div>`;
  document.body.appendChild(modal);
}

function renderResults() {
  const score = computeScore();
  const elapsed = Math.floor((STATE.finishedAt - STATE.startedAt) / 1000);
  const min = Math.floor(elapsed / 60), sec = elapsed % 60;
  const pct = Math.round((score.correct / score.total) * 100);
  let uploadHtml = '';
  if (STATE.uploadStatus === 'pending') uploadHtml = `<div class="upload-status">Saving results to teacher dashboard…</div>`;
  else if (STATE.uploadStatus === 'success') uploadHtml = `<div class="upload-status success">✓ Results saved to teacher dashboard</div>`;
  else if (STATE.uploadStatus === 'error') uploadHtml = `<div class="upload-status error">Could not save automatically. Please notify your teacher of your score.</div>`;
  root.innerHTML = `${topBarSimple('Test Complete')}
    <div class="results-screen">
      <div class="results-card">
        <h1>Well Done!</h1>
        <div class="student-line"><strong>${escapeHtml(STATE.studentName)}</strong> · ${TEST_META.title} · ${TEST_META.topic}</div>
        <div class="score-display"><span class="score">${score.correct}</span><span class="total">/ ${score.total}</span></div>
        <div class="score-pct">${pct}%</div>
        <div class="score-time">Time taken: ${min}m ${sec}s</div>
        <div class="results-actions">
          <button onclick="goReview()">Review Answers</button>
          <button class="secondary" onclick="restartTest()">Restart</button>
          <button class="secondary" onclick="goHome()">Home</button>
        </div>
        ${uploadHtml}
      </div>
    </div>`;
}

function renderReview() {
  const reviewRows = PASSAGE.paragraphs.map(p => {
    const userAns = STATE.answers[p.letter];
    const correctAns = p.correctOption;
    const isCorrect = userAns === correctAns;
    const correctOpt = OPTIONS.find(o => o.letter === correctAns);
    const userOpt = userAns ? OPTIONS.find(o => o.letter === userAns) : null;
    let statusBadge, rowCls;
    if (!userAns) { statusBadge = `<span class="review-status wrong">NOT ANSWERED</span>`; rowCls = 'wrong'; }
    else if (isCorrect) { statusBadge = `<span class="review-status correct">✓ CORRECT</span>`; rowCls = 'correct'; }
    else { statusBadge = `<span class="review-status wrong">✕ INCORRECT</span>`; rowCls = 'wrong'; }
    const isOpen = STATE.showSolution[p.letter];
    return `<div class="review-row ${rowCls}">
      <div class="header"><span class="gap-num">Paragraph ${p.letter} · Q${p.qNum}</span>${statusBadge}</div>
      ${userAns && !isCorrect ? `<div class="answer-line user-ans"><strong>Your answer (${userAns}):</strong> ${escapeHtml(userOpt.text)}</div>` : ''}
      <div class="answer-line correct-ans"><strong>Correct answer (${correctAns}):</strong> ${escapeHtml(correctOpt.text)}</div>
      <button class="solution-toggle-btn" onclick="toggleSolution('${p.letter}')">${isOpen ? '▲ Hide solution' : '💡 Show solution'}</button>
      ${isOpen ? `<div class="solution-panel">
        <h4>Why this is correct</h4><p>${p.solution.evidence}</p>
        <h4>Why not the others</h4><p class="why-not">${p.solution.whyNot}</p>
      </div>` : ''}
    </div>`;
  }).join('');
  const score = computeScore();
  root.innerHTML = `<div class="review-banner">
      <div class="info"><span>Reviewing</span><span class="badge">${score.correct} / ${score.total}</span></div>
      <div><button onclick="exitReview()">← Back to Results</button></div>
    </div>
    <div class="content" style="display: block; overflow-y: auto;">
      <div style="padding: 24px 32px; max-width: 920px; margin: 0 auto;">
        <h1 style="font-family: 'Lora', Georgia, serif; font-size: 24px; color: var(--jk-navy); text-align: center; margin-bottom: 18px;">${PASSAGE.title}</h1>
        ${reviewRows}
        <div class="review-row" style="border-left-color: var(--jk-gold); margin-top: 24px;">
          <div class="header"><span class="gap-num">Note: Unused option (${EXTRA_OPTION})</span></div>
          <div class="solution-panel"><p>${EXTRA_NOTE}</p></div>
        </div>
      </div>
    </div>`;
}

function optDragStart(ev, letter) {
  STATE.draggingOption = letter;
  ev.dataTransfer.effectAllowed = 'move';
  try { ev.dataTransfer.setData('text/plain', letter); } catch (_) {}
  ev.currentTarget.classList.add('dragging');
}
function optDragEnd(ev) {
  ev.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.slot-target.drag-over').forEach(el => el.classList.remove('drag-over'));
}
function slotDragOver(ev, paraLetter) {
  ev.preventDefault();
  ev.dataTransfer.dropEffect = 'move';
  ev.currentTarget.classList.add('drag-over');
}
function slotDragLeave(ev) { ev.currentTarget.classList.remove('drag-over'); }
function slotDrop(ev, paraLetter) {
  ev.preventDefault();
  ev.currentTarget.classList.remove('drag-over');
  let letter = STATE.draggingOption;
  if (!letter) {
    const txt = ev.dataTransfer.getData('text/plain');
    if (txt) letter = txt;
  }
  if (!letter) return;
  Object.keys(STATE.answers).forEach(k => { if (STATE.answers[k] === letter) delete STATE.answers[k]; });
  STATE.answers[paraLetter] = letter;
  STATE.draggingOption = null;
  render();
}
function clearSlot(paraLetter) { delete STATE.answers[paraLetter]; render(); }

function goConfirm() { if (!STATE.studentName.trim()) return; STATE.screen = 'confirm'; render(); }
function startTest() { STATE.screen = 'test'; STATE.startedAt = Date.now(); startTimer(); render(); }
function goSubmit() { STATE.screen = 'submitConfirm'; render(); }
function cancelSubmit() { STATE.screen = 'test'; document.getElementById('submitModal')?.remove(); }
function finalizeSubmit() {
  stopTimer();
  STATE.finishedAt = Date.now();
  STATE.screen = 'submitted';
  document.getElementById('submitModal')?.remove();
  document.getElementById('timeUpModal')?.remove();
  uploadResults();
  render();
}
function goReview() { STATE.screen = 'review'; render(); }
function exitReview() { STATE.screen = 'submitted'; render(); }
function toggleSolution(paraLetter) { STATE.showSolution[paraLetter] = !STATE.showSolution[paraLetter]; render(); }
function restartTest() {
  if (!confirm('Restart the test? All answers will be cleared.')) return;
  STATE.screen = 'name'; STATE.studentName = '';
  STATE.timerSeconds = TEST_META.durationSeconds; STATE.timerHidden = false;
  STATE.answers = {}; STATE.draggingOption = null;
  STATE.showSolution = {}; STATE.uploadStatus = 'pending';
  STATE.startedAt = null; STATE.finishedAt = null;
  stopTimer(); render();
}
function goHome() {
  if (STATE.screen === 'test' && Object.keys(STATE.answers).length > 0) {
    if (!confirm('Leave the test? Your progress will be lost.')) return;
  }
  window.location.href = '../';
}

function startTimer() {
  stopTimer();
  timerInterval = setInterval(() => {
    STATE.timerSeconds--;
    if (STATE.timerSeconds <= 0) { stopTimer(); STATE.timerSeconds = 0; STATE.screen = 'timeUp'; render(); return; }
    updateTimerDisplay();
  }, 1000);
}
function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }
function updateTimerDisplay() {
  const el = document.querySelector('.timer-digits');
  if (el) el.innerHTML = formatTimer();
  const block = document.querySelector('.timer-block');
  if (block) {
    block.classList.remove('warning', 'danger');
    if (STATE.timerSeconds <= 30) block.classList.add('danger');
    else if (STATE.timerSeconds <= 120) block.classList.add('warning');
  }
}
function formatTimer() {
  const h = Math.floor(STATE.timerSeconds / 3600);
  const m = Math.floor((STATE.timerSeconds % 3600) / 60);
  const s = STATE.timerSeconds % 60;
  const pad = n => String(n).padStart(2, '0');
  return `<span class="num">${pad(h)}</span><span class="colon">:</span><span class="num">${pad(m)}</span><span class="colon">:</span><span class="num">${pad(s)}</span>`;
}
function toggleHideTime() { STATE.timerHidden = !STATE.timerHidden; render(); }
function zoomToggle() {
  const cur = parseFloat(document.body.style.zoom || '1');
  document.body.style.zoom = cur >= 1.2 ? '1' : (cur + 0.1).toFixed(1);
}

function computeScore() {
  let correct = 0;
  PASSAGE.paragraphs.forEach(p => { if (STATE.answers[p.letter] === p.correctOption) correct++; });
  return { correct, total: PASSAGE.paragraphs.length };
}

function uploadResults() {
  if (!GOOGLE_SHEETS_URL) { STATE.uploadStatus = 'disabled'; return; }
  const score = computeScore();
  const elapsed = Math.floor((STATE.finishedAt - STATE.startedAt) / 1000);
  const answersStr = PASSAGE.paragraphs.map(p => {
    const u = STATE.answers[p.letter] || '-';
    return `Para${p.letter}(Q${p.qNum}):${u}(${p.correctOption})`;
  }).join(' | ');
  const payload = {
    studentName: STATE.studentName, setName: TEST_META.testId,
    timestamp: new Date().toISOString(),
    timestampLocal: new Date().toLocaleString('en-AU', { timeZone: 'Australia/Sydney' }),
    totalScore: score.correct, totalPossible: score.total,
    percentage: Math.round((score.correct / score.total) * 100),
    timeTakenSeconds: elapsed,
    timeTakenFormatted: `${Math.floor(elapsed/60)}m ${elapsed%60}s`,
    sectionA: '-', sectionB: '-', sectionC: '-', sectionD: '-', sectionE: '-',
    answers: answersStr
  };
  STATE.uploadStatus = 'pending';
  render();
  fetch(GOOGLE_SHEETS_URL, {
    method: 'POST', mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(payload)
  }).then(() => {
    STATE.uploadStatus = 'success';
    if (STATE.screen === 'submitted') render();
  }).catch(() => {
    STATE.uploadStatus = 'error';
    if (STATE.screen === 'submitted') render();
  });
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"
  }[c]));
}
render();
</script>
</body>
</html>
