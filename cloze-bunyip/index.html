button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

#app { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* TOP BAR (same as summary) */

<script>
const GOOGLE_SHEETS_URL = '';

const TEST_META = {
  testId: 'TestDay-GapText-Bunyip',
  title: 'Gap Text',
  topic: 'The Quiet Empire of the Bunyip Trick',
  durationSeconds: 540,  // 9 minutes
  totalQuestions: 6
};

const PASSAGE = {
  title: 'The Quiet Empire of the Bunyip Trick',
  subtitle: 'Test-day morning paper — Gap Text · 9 minutes',
  bodyHtml: `<p>For most of a hundred years, the bunyip — the shy, water-dwelling creature of older Australian stories — has appeared in almost every children's picture book published in this country. The story of how the bunyip came to occupy that place, and of the three illustrators across a century who shaped what it became, turns out to be a story of small printing rooms, pushy teachers, school libraries that ran out of shelf space, and a slow argument about what an Australian children's book is actually for.</p>
<p>May Whitlock, a Sydney kindergarten teacher, had found herself increasingly impatient with the storybooks her pupils were given. The shelves of the local library carried English fairies and German goblins but nothing recognisably from the country outside the window. Whitlock spent the long summer of 1922 painting watercolour sketches at her sister's farm near Bowral, drawing the bunyip the way her grandmother had described it — small, mossy, and given to vanishing into bottles. {{15}} Within six months Whitlock had sold every copy, mostly to other kindergarten teachers and the parents of her pupils, and a second printing of two thousand copies followed in early 1924.</p>
<p>The book caught the attention of two Sydney newspapers and was the subject of a feature in the Women's Weekly the following year. Whitlock continued painting bunyip stories for the next twelve years, producing six more books, each printed from the same small press in Glebe. She never set up a formal publishing company and never accepted offers from larger firms, preferring to control the appearance of every page herself. When she retired from teaching in 1935, the small press kept printing her books from her original plates until the building was lost. {{16}}</p>
<p>By the 1970s, Australian children's publishing had multiplied. But the new books on most school library shelves were largely American and British imports, and Margaret Park, a Sydney primary school librarian who had grown up reading Whitlock's bunyip stories, opposed this trend from the start. {{17}} Park had spent her childhood believing that bunyips lived in the Wollondilly River near her grandparents' farm, and she could not see why a Sydney child in 1972 should not have the same experience with the books on her library shelf.</p>
<p>In 1973, Park began commissioning short bunyip picture books from young illustrators, printing them on a small printing press she had bought second-hand from a school in Marrickville. Bunyip Books, the imprint she founded under her own kitchen table, distributed its first titles to her own school's library and then, gradually, to the libraries of other primary schools in the district. The first hundred orders came from teachers willing to risk a small unfamiliar imprint. {{18}} Within five years Park had moved Bunyip Books to a larger warehouse in Marrickville, hired three full-time illustrators, and had begun supplying the libraries of every state primary school in New South Wales.</p>
<p>By 1985, Bunyip Books had published more than forty titles, and the imprint's stories were being supplied to school libraries in every Australian state. In that decade Park signed an agreement with the New South Wales Department of Education, donating the printing rights of the imprint's twenty most popular books in exchange for royalties paid to the families of the original illustrators. The agreement was honoured for the next thirty years, until physical school-library budgets contracted in the late 2010s. {{19}} By the early 2020s, Bunyip Books survived only as scanned PDFs on a Department of Education portal, and a Sydney that had once been the capital of Australian children's publishing was no longer the centre of how Australian children read.</p>
<p>The Australian children's picture book faced an unfamiliar problem in the new century. Children no longer turned the pages of cardboard books; they scrolled through stories on tablets, often before bed. Eliza Tran, a Melbourne-born illustrator who launched the Long Story Short platform in 2021, began experimenting with animated picture-book formats for the digital reader. "I grew up with my grandmother telling me bunyip stories in Vietnamese," Tan told an interviewer. "She always said, 'A bunyip never stops moving.' My picture books have to move too — that's the only way the bunyip survives the screen." {{20}} Tan calls Long Story Short an "animated picture platform" rather than a publishing house, a name she hopes will outlast its slightly awkward sound.</p>`,
  gaps: [
    { qNum: 15, correctLetter: 'E',
      solution: { evidence: "The sentence before describes Whitlock 'painting watercolour sketches', and the sentence after says 'Within six months Whitlock had sold every copy.' The gap requires a PUBLICATION moment. E supplies it: 'Thus Bunyip in the Bottle was published in Sydney in 1923, with a small print run.' The connective 'Thus' echoes the cause-and-effect, and the title 'Bunyip in the Bottle' picks up the previous sentence's 'vanishing into bottles'.",
        whyNot: "<strong>G</strong> ('The original Whitlock printing in Glebe was destroyed by flood in 1947') is also about Whitlock's printing, but G describes the modern fate of the press — destroyed and at auctions — which contradicts the next sentence ('Within six months Whitlock had sold every copy') which requires the press operating, not destroyed. G is a closing comment, not a founding event. G belongs at Gap 16." } },
    { qNum: 16, correctLetter: 'G',
      solution: { evidence: "Gap 16 sits at the end of paragraph 3, with the next paragraph beginning with a new pioneer (Park). The gap requires a CLOSING COMMENT on Whitlock's era. G provides exactly that: 'The original Whitlock printing in Glebe was destroyed by flood in 1947, but signed copies still appear at auctions.' 'The original Whitlock printing in Glebe' refers anaphorically to the Glebe press described in the paragraph.",
        whyNot: "<strong>D</strong> ('The Marrickville warehouse closed for good by the time the digital editions launched') is also a closing statement about a Sydney site. But D specifies MARRICKVILLE and DIGITAL EDITIONS — neither has been mentioned at this point. Park's Marrickville and Tan's digital editions appear later. D is anachronistic at Gap 16. D belongs at Gap 19." } },
    { qNum: 17, correctLetter: 'A',
      solution: { evidence: "The sentence before says Park 'opposed this trend from the start.' The sentence after begins 'Park had spent her childhood believing that bunyips lived in the Wollondilly River.' The gap requires a specific complaint that gives Park concrete grounds for opposition. A does this: 'She told a fellow teacher that the imported books showed English meadows to children in Sydney suburbs.' The English-meadows-vs-Sydney-suburbs mismatch contrasts with the Wollondilly-River-as-real-bunyip-territory.",
        whyNot: "<strong>F</strong> ('The new edition included two-colour printing and sold sixty thousand copies in three years') is also about a Park book. But F describes her later success, not her earlier grievance. The next sentence requires a reason for her opposition — the English-meadows complaint, not later success. F belongs at Gap 18." } },
    { qNum: 18, correctLetter: 'F',
      solution: { evidence: "The sentence before says 'The first hundred orders came from teachers willing to risk a small unfamiliar imprint.' The sentence after describes the move to a larger Marrickville warehouse. The gap requires a description of the book/edition that explains how Bunyip Books went from a hundred orders to state-wide supplier. F does this: 'The new edition included two-colour printing and sold sixty thousand copies in three years' — explaining the scale that made the warehouse expansion necessary.",
        whyNot: "<strong>D</strong> ('The Marrickville warehouse closed for good by the time the digital editions launched') is about the CLOSURE of the warehouse, dated long after the project succeeded. At Gap 18, Park's expansion is just beginning; the next sentence describes her MOVING INTO the warehouse, not its eventual closure. D belongs at Gap 19." } },
    { qNum: 19, correctLetter: 'D',
      solution: { evidence: "The sentence before says the agreement 'was honoured for the next thirty years, until physical school-library budgets contracted in the late 2010s.' The sentence after begins 'By the early 2020s, Bunyip Books survived only as scanned PDFs.' The gap requires a TIMING/MEDIUM PUNCHLINE that bridges late-2010s budget contraction and early-2020s digital-only survival. D supplies it: 'The Marrickville warehouse closed for good by the time the digital editions launched.'",
        whyNot: "<strong>G</strong> ('The original Whitlock printing in Glebe was destroyed by flood in 1947') is also a closing statement about a Sydney printing site. But G is about WHITLOCK'S Glebe press (1920s-1947); D is about the MARRICKVILLE warehouse that housed Bunyip Books (1970s-2010s). The next sentence requires a Park-era closure that bridges to digital, not a Whitlock-era flood commemoration. G belongs at Gap 16." } },
    { qNum: 20, correctLetter: 'C',
      solution: { evidence: "The sentence before ends with Tan's quoted words containing an EMBEDDED QUOTE from her grandmother: 'A bunyip never stops moving.' The gap requires a sentence that addresses what Tan's team does with that phrase. C does this: 'The very phrase has become a kind of motto for Tan and her illustrators.' 'The very phrase' anaphorically refers to the grandmother's quoted words.",
        whyNot: "<strong>A</strong> ('She told a fellow teacher that the imported books showed English meadows to children in Sydney suburbs') describes a complaint about meadow imagery, but does NOT quote anyone. 'The very phrase' specifically requires a prior described phrase — quoted words. The grandmother's 'A bunyip never stops moving' IS the phrase that 'the very phrase' references. A belongs at Gap 17 (Park's complaint)." } }
  ]
};

const SENTENCES = [
  { letter: 'A', text: 'She told a fellow teacher that the imported books showed English meadows to children in Sydney suburbs.' },
  { letter: 'B', text: 'These habits have endured because Australian children read what their teachers and parents read first.' },
  { letter: 'C', text: 'The very phrase has become a kind of motto for Tan and her illustrators.' },
  { letter: 'D', text: 'The Marrickville warehouse closed for good by the time the digital editions launched.' },
  { letter: 'E', text: 'Thus Bunyip in the Bottle was published in Sydney in 1923, with a small print run.' },
  { letter: 'F', text: 'The new edition included two-colour printing and sold sixty thousand copies in three years.' },
  { letter: 'G', text: 'The original Whitlock printing in Glebe was destroyed by flood in 1947, but signed copies still appear at auctions.' }
];
const EXTRA_LETTER = 'B';
const EXTRA_NOTE = "Sentence B (\"These habits have endured because Australian children read what their teachers and parents read first.\") is the unused option. It is thematically connected — the text is about Australian children's reading culture across generations — but the connective 'These habits' demands a prior described tradition of multi-generational reading inheritance, which no gap requires. B is most tempting at Gap 20, where Tan's grandmother represents an inherited reading tradition; but the previous sentence ends with the grandmother's quoted phrase 'A bunyip never stops moving', which B does not address. B is a recognisable kind of extra: thematically right, structurally inert.";

const STATE = {
  screen: 'name',
  studentName: '',
  startedAt: null,
  finishedAt: null,
  timerSeconds: TEST_META.durationSeconds,
  timerHidden: false,
  // answers[gapNum] = letter
  answers: {},
  draggingSentence: null,
  showSolution: {},
  uploadStatus: 'pending'
};

let timerInterval = null;
const root = document.getElementById('app');

function render() {
  switch (STATE.screen) {
    case 'name': renderNameEntry(); break;
    case 'confirm': renderConfirm(); break;
    case 'test': renderTest(); break;
    case 'submitConfirm': renderTest(); renderSubmitModal(); break;
    case 'timeUp': renderTest(); renderTimeUpModal(); break;
    case 'submitted': renderResults(); break;
    case 'review': renderReview(); break;
  }
}

function jkLogo() {
  return `<div class="jk-logo">
    <div class="mark">JK</div>
    <div class="text">
      <span class="l1">JK COACHING</span>
      <span class="l2">COLLEGE</span>
    </div>
  </div>`;
}

function topBar() {
  let timerCls = '';
  if (STATE.timerSeconds <= 30) timerCls = 'danger';
  else if (STATE.timerSeconds <= 120) timerCls = 'warning';
  return `<div class="top-bar">
    <div class="left-cluster">
      <button class="zoom-btn" onclick="zoomToggle()">+</button>
      <div class="timer-block ${timerCls}">
        <div class="timer-digits" style="${STATE.timerHidden ? 'visibility:hidden' : ''}">${formatTimer()}</div>
        ${STATE.timerHidden ? '' : `<div class="timer-labels"><span>Hours</span><span>Mins</span><span>Secs</span></div>`}
      </div>
      <button class="hide-time-btn" onclick="toggleHideTime()">${STATE.timerHidden ? 'Show time' : 'Hide time'}</button>
    </div>
    <div class="center-cluster"><span class="q-title">${TEST_META.title} · Q15–20</span></div>
    <div class="right-cluster">${jkLogo()}</div>
  </div>`;
}

function topBarSimple(text) {
  return `<div class="top-bar">
    <div class="left-cluster"><button class="zoom-btn">+</button></div>
    <div class="center-cluster"><span class="q-title">${text}</span></div>
    <div class="right-cluster">${jkLogo()}</div>
  </div>`;
}

function renderNameEntry() {
  root.innerHTML = `
    ${topBarSimple(TEST_META.title + ' · ' + TEST_META.topic)}
    <div class="cover-screen">
      <div class="cover-card">
        <div class="brand-mark">JK</div>
        <h1>JK Coaching College</h1>
        <div class="subtitle">${TEST_META.title} — ${TEST_META.topic}</div>
        <div class="question">Please enter your name to begin</div>
        <div class="sub">
          You will have <strong>9 minutes</strong>.<br>
          Six sentences have been removed from the text.
          Drag each sentence (A–G) into the matching gap. One sentence is extra.
        </div>
        <input type="text" class="name-input" id="nameInput" placeholder="e.g. Sarah Kim"
               value="${escapeHtml(STATE.studentName)}"
               oninput="STATE.studentName = this.value; document.getElementById('startBtn').disabled = !this.value.trim();"
               onkeypress="if(event.key === 'Enter' && this.value.trim()) goConfirm()">
        <div class="name-hint">${TEST_META.totalQuestions} questions · 9 minutes</div>
        <div class="cover-actions">
          <button id="startBtn" ${STATE.studentName.trim() ? '' : 'disabled'} onclick="goConfirm()">Continue</button>
        </div>
        <a href="../" class="back-link">← Back to home</a>
      </div>
    </div>
  `;
  setTimeout(() => document.getElementById('nameInput')?.focus(), 50);
}

function renderConfirm() {
  root.innerHTML = `
    ${topBarSimple('')}
    <div class="cover-screen">
      <div class="cover-card">
        <div class="brand-mark">JK</div>
        <h1>${escapeHtml(STATE.studentName)}</h1>
        <div class="subtitle">${TEST_META.title} — ${TEST_META.topic}</div>
        <div class="question">Ready to begin?</div>
        <div class="sub">The timer (9 minutes) will start when you click Yes.<br>When time runs out the test is submitted automatically.</div>
        <div class="cover-actions">
          <button class="secondary" onclick="STATE.screen='name'; render();">No, go back</button>
          <button onclick="startTest()">Yes, start</button>
        </div>
      </div>
    </div>
  `;
}

function renderTest() {
  const placedSet = new Set(Object.values(STATE.answers));

  // Build passage with inline gaps
  const bodyHtml = PASSAGE.bodyHtml.replace(/\{\{(\d+)\}\}/g, (_, gapNum) => {
    const sIdx = STATE.answers[gapNum];
    const filled = sIdx !== undefined && sIdx !== null;
    if (filled) {
      const sent = SENTENCES.find(s => s.letter === sIdx);
      const previewShort = sent.text.length > 80 ? sent.text.slice(0, 80) + '…' : sent.text;
      return `<span class="si-inline-gap filled"
                    data-gap="${gapNum}"
                    ondragover="gapDragOver(event, '${gapNum}')"
                    ondragleave="gapDragLeave(event)"
                    ondrop="gapDrop(event, '${gapNum}')">
        <span class="gap-label">Q.${gapNum}</span>
        <span class="gap-content"><strong>${sIdx}.</strong> ${escapeHtml(previewShort)}</span>
        <span class="gap-clear" onclick="clearGap('${gapNum}'); event.stopPropagation();" title="Remove">✕</span>
      </span>`;
    }
    return `<span class="si-inline-gap"
                  data-gap="${gapNum}"
                  ondragover="gapDragOver(event, '${gapNum}')"
                  ondragleave="gapDragLeave(event)"
                  ondrop="gapDrop(event, '${gapNum}')">
      <span class="gap-label">Q.${gapNum}</span>
      <span class="gap-content">______________________</span>
    </span>`;
  });

  // Sentence cards
  const sentencesHtml = SENTENCES.map(s => {
    const placed = placedSet.has(s.letter);
    return `<div class="si-sentence ${placed ? 'placed' : ''}"
                  draggable="${placed ? 'false' : 'true'}"
                  ondragstart="sentDragStart(event, '${s.letter}')"
                  ondragend="sentDragEnd(event)">
      <span class="si-letter">${s.letter}</span>
      <span class="si-text">${escapeHtml(s.text)}</span>
    </div>`;
  }).join('');

  root.innerHTML = `
    ${topBar()}
    <div class="content">
      <div class="pane-left">
        <div class="instruction">Read the text below. Six sentences have been removed from the text. Choose from the sentences (A – G) the one which fits each gap (15 – 20). There is one extra sentence which you do not need to use.</div>
        <div class="passage-title">${PASSAGE.title}</div>
        <div class="passage-subtitle">${PASSAGE.subtitle}</div>
        <div class="passage-body">${bodyHtml}</div>
      </div>
      <div class="pane-right">
        <div class="options-instruction">Sentences A – G</div>
        <div class="drag-hint">Drag each sentence onto the gap (Q.15–Q.20) where it best fits.</div>
        <div class="si-sentences-list">${sentencesHtml}</div>
      </div>
    </div>
    <div class="bottom-bar">
      <button class="btn btn-back" onclick="goHome()">← Home</button>
      <button class="btn btn-submit" onclick="goSubmit()">Submit ▸</button>
    </div>
  `;
}

function renderSubmitModal() {
  const unanswered = PASSAGE.gaps.filter(g => !STATE.answers[g.qNum]).length;
  const modal = document.createElement('div');
  modal.className = 'modal-bg';
  modal.id = 'submitModal';
  modal.innerHTML = `
    <div class="modal-card">
      <h2>Submit your test?</h2>
      <p>${unanswered > 0 ? `You have <strong>${unanswered}</strong> unanswered gap${unanswered > 1 ? 's' : ''}.` : 'You have answered all gaps.'}<br>
      Once submitted, you cannot change your answers.</p>
      <div class="modal-actions">
        <button class="secondary" onclick="cancelSubmit()">Cancel</button>
        <button onclick="finalizeSubmit()">Submit</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
}

function renderTimeUpModal() {
  const modal = document.createElement('div');
  modal.className = 'modal-bg';
  modal.id = 'timeUpModal';
  modal.innerHTML = `
    <div class="modal-card warning">
      <h2>⏰ Time's up!</h2>
      <p>The 9 minutes are over. Your test will be submitted automatically.</p>
      <div class="modal-actions">
        <button onclick="finalizeSubmit()">View Results</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
}

function renderResults() {
  const score = computeScore();
  const elapsed = Math.floor((STATE.finishedAt - STATE.startedAt) / 1000);
  const min = Math.floor(elapsed / 60);
  const sec = elapsed % 60;
  const pct = Math.round((score.correct / score.total) * 100);

  let uploadHtml = '';
  if (STATE.uploadStatus === 'pending') uploadHtml = `<div class="upload-status">Saving results to teacher dashboard…</div>`;
  else if (STATE.uploadStatus === 'success') uploadHtml = `<div class="upload-status success">✓ Results saved to teacher dashboard</div>`;
  else if (STATE.uploadStatus === 'error') uploadHtml = `<div class="upload-status error">Could not save automatically. Please notify your teacher of your score.</div>`;

  root.innerHTML = `
    ${topBarSimple('Test Complete')}
    <div class="results-screen">
      <div class="results-card">
        <h1>Well Done!</h1>
        <div class="student-line"><strong>${escapeHtml(STATE.studentName)}</strong> · ${TEST_META.title} · ${TEST_META.topic}</div>
        <div class="score-display">
          <span class="score">${score.correct}</span>
          <span class="total">/ ${score.total}</span>
        </div>
        <div class="score-pct">${pct}%</div>
        <div class="score-time">Time taken: ${min}m ${sec}s</div>
        <div class="results-actions">
          <button onclick="goReview()">Review Answers</button>
          <button class="secondary" onclick="restartTest()">Restart</button>
          <button class="secondary" onclick="goHome()">Home</button>
        </div>
        ${uploadHtml}
      </div>
    </div>
  `;
}

function renderReview() {
  const reviewRows = PASSAGE.gaps.map(g => {
    const userAns = STATE.answers[g.qNum];
    const correctAns = g.correctLetter;
    const isCorrect = userAns === correctAns;
    const correctSent = SENTENCES.find(s => s.letter === correctAns);
    const userSent = userAns ? SENTENCES.find(s => s.letter === userAns) : null;

    let statusBadge, rowCls;
    if (!userAns) {
      statusBadge = `<span class="review-status wrong">NOT ANSWERED</span>`;
      rowCls = 'wrong';
    } else if (isCorrect) {
      statusBadge = `<span class="review-status correct">✓ CORRECT</span>`;
      rowCls = 'correct';
    } else {
      statusBadge = `<span class="review-status wrong">✕ INCORRECT</span>`;
      rowCls = 'wrong';
    }

    const isOpen = STATE.showSolution[g.qNum];
    return `
      <div class="review-row ${rowCls}">
        <div class="header">
          <span class="gap-num">Q${g.qNum}</span>
          ${statusBadge}
        </div>
        ${userAns && !isCorrect ? `<div class="answer-line user-ans"><strong>Your answer (${userAns}):</strong> ${escapeHtml(userSent.text)}</div>` : ''}
        <div class="answer-line correct-ans"><strong>Correct answer (${correctAns}):</strong> ${escapeHtml(correctSent.text)}</div>
        <button class="solution-toggle-btn" onclick="toggleSolution(${g.qNum})">
          ${isOpen ? '▲ Hide solution' : '💡 Show solution'}
        </button>
        ${isOpen ? `<div class="solution-panel">
          <h4>Why this is correct</h4>
          <div>${g.solution.evidence}</div>
          <h4 style="margin-top: 10px;">Why not the others</h4>
          <div class="why-not">${g.solution.whyNot}</div>
        </div>` : ''}
      </div>
    `;
  }).join('');

  const score = computeScore();

  root.innerHTML = `
    <div class="review-banner">
      <div class="info">
        <span>Reviewing</span>
        <span class="badge">${score.correct} / ${score.total}</span>
      </div>
      <div><button onclick="exitReview()">← Back to Results</button></div>
    </div>
    <div class="content" style="display: block; overflow-y: auto;">
      <div style="padding: 24px 32px; max-width: 920px; margin: 0 auto;">
        <h1 style="font-family: 'Lora', Georgia, serif; font-size: 24px; color: var(--jk-navy); text-align: center; margin-bottom: 18px;">${PASSAGE.title}</h1>
        ${reviewRows}
        <div class="review-row" style="border-left-color: var(--jk-gold); margin-top: 24px;">
          <div class="header"><span class="gap-num">Note: Unused option</span></div>
          <div class="solution-panel"><p>${EXTRA_NOTE}</p></div>
        </div>
      </div>
    </div>
  `;
}

/* DRAG & DROP */
function sentDragStart(ev, letter) {
  STATE.draggingSentence = letter;
  ev.dataTransfer.effectAllowed = 'move';
  try { ev.dataTransfer.setData('text/plain', letter); } catch (_) {}
  ev.currentTarget.classList.add('dragging');
}
function sentDragEnd(ev) {
  ev.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.si-inline-gap.drag-over').forEach(el => el.classList.remove('drag-over'));
}
function gapDragOver(ev, gapNum) {
  ev.preventDefault();
  ev.dataTransfer.dropEffect = 'move';
  ev.currentTarget.classList.add('drag-over');
}
function gapDragLeave(ev) {
  ev.currentTarget.classList.remove('drag-over');
}
function gapDrop(ev, gapNum) {
  ev.preventDefault();
  ev.currentTarget.classList.remove('drag-over');
  let letter = STATE.draggingSentence;
  if (!letter) {
    const txt = ev.dataTransfer.getData('text/plain');
    if (txt) letter = txt;
  }
  if (!letter) return;
  Object.keys(STATE.answers).forEach(k => {
    if (STATE.answers[k] === letter) delete STATE.answers[k];
  });
  STATE.answers[gapNum] = letter;
  STATE.draggingSentence = null;
  render();
}
function clearGap(gapNum) {
  delete STATE.answers[gapNum];
  render();
}

/* NAV & TIMER */
function goConfirm() { if (!STATE.studentName.trim()) return; STATE.screen = 'confirm'; render(); }
function startTest() {
  STATE.screen = 'test';
  STATE.startedAt = Date.now();
  startTimer();
  render();
}
function goSubmit() { STATE.screen = 'submitConfirm'; render(); }
function cancelSubmit() {
  STATE.screen = 'test';
  document.getElementById('submitModal')?.remove();
}
function finalizeSubmit() {
  stopTimer();
  STATE.finishedAt = Date.now();
  STATE.screen = 'submitted';
  document.getElementById('submitModal')?.remove();
  document.getElementById('timeUpModal')?.remove();
  uploadResults();
  render();
}
function goReview() { STATE.screen = 'review'; render(); }
function exitReview() { STATE.screen = 'submitted'; render(); }
function toggleSolution(qNum) {
  STATE.showSolution[qNum] = !STATE.showSolution[qNum];
  render();
}
function restartTest() {
  if (!confirm('Restart the test? All answers will be cleared.')) return;
  STATE.screen = 'name';
  STATE.studentName = '';
  STATE.timerSeconds = TEST_META.durationSeconds;
  STATE.timerHidden = false;
  STATE.answers = {};
  STATE.draggingSentence = null;
  STATE.showSolution = {};
  STATE.uploadStatus = 'pending';
  STATE.startedAt = null;
  STATE.finishedAt = null;
  stopTimer();
  render();
}
function goHome() {
  if (STATE.screen === 'test' && Object.keys(STATE.answers).length > 0) {
    if (!confirm('Leave the test? Your progress will be lost.')) return;
  }
  window.location.href = '../';
}

function startTimer() {
  stopTimer();
  timerInterval = setInterval(() => {
    STATE.timerSeconds--;
    if (STATE.timerSeconds <= 0) {
      stopTimer();
      STATE.timerSeconds = 0;
      STATE.screen = 'timeUp';
      render();
      return;
    }
    updateTimerDisplay();
  }, 1000);
}
function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }
function updateTimerDisplay() {
  const el = document.querySelector('.timer-digits');
  if (el) el.innerHTML = formatTimer();
  const block = document.querySelector('.timer-block');
  if (block) {
    block.classList.remove('warning', 'danger');
    if (STATE.timerSeconds <= 30) block.classList.add('danger');
    else if (STATE.timerSeconds <= 120) block.classList.add('warning');
  }
}
function formatTimer() {
  const h = Math.floor(STATE.timerSeconds / 3600);
  const m = Math.floor((STATE.timerSeconds % 3600) / 60);
  const s = STATE.timerSeconds % 60;
  const pad = n => String(n).padStart(2, '0');
  return `<span class="num">${pad(h)}</span><span class="colon">:</span><span class="num">${pad(m)}</span><span class="colon">:</span><span class="num">${pad(s)}</span>`;
}
function toggleHideTime() { STATE.timerHidden = !STATE.timerHidden; render(); }
function zoomToggle() {
  const cur = parseFloat(document.body.style.zoom || '1');
  document.body.style.zoom = cur >= 1.2 ? '1' : (cur + 0.1).toFixed(1);
}

function computeScore() {
  let correct = 0;
  PASSAGE.gaps.forEach(g => { if (STATE.answers[g.qNum] === g.correctLetter) correct++; });
  return { correct, total: PASSAGE.gaps.length };
}

function uploadResults() {
  if (!GOOGLE_SHEETS_URL) {
    STATE.uploadStatus = 'disabled';
    return;
  }
  const score = computeScore();
  const elapsed = Math.floor((STATE.finishedAt - STATE.startedAt) / 1000);
  const answersStr = PASSAGE.gaps.map(g => {
    const u = STATE.answers[g.qNum] || '-';
    return `Q${g.qNum}:${u}(${g.correctLetter})`;
  }).join(' | ');

  const payload = {
    studentName: STATE.studentName,
    setName: TEST_META.testId,
    timestamp: new Date().toISOString(),
    timestampLocal: new Date().toLocaleString('en-AU', { timeZone: 'Australia/Sydney' }),
    totalScore: score.correct,
    totalPossible: score.total,
    percentage: Math.round((score.correct / score.total) * 100),
    timeTakenSeconds: elapsed,
    timeTakenFormatted: `${Math.floor(elapsed/60)}m ${elapsed%60}s`,
    sectionA: '-', sectionB: '-', sectionC: '-', sectionD: '-', sectionE: '-',
    answers: answersStr
  };

  STATE.uploadStatus = 'pending';
  render();

  fetch(GOOGLE_SHEETS_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(payload)
  }).then(() => {
    STATE.uploadStatus = 'success';
    if (STATE.screen === 'submitted') render();
  }).catch(() => {
    STATE.uploadStatus = 'error';
    if (STATE.screen === 'submitted') render();
  });
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"
  }[c]));
}

render();
</script>
