<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OC Reading Practice — JK Coaching College</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --jk-navy: #002664;
  --jk-navy-dark: #001a47;
  --jk-gold: #c9a55c;
  --gap-blue: #4a6e9c;
  --slot-bg: #4a6b9c;
  --opt-border: #8aa1c4;
  --opt-bg: #f5f7fa;
  --bg-page: #d6d8db;
  --header-bg: #e7ecf2;
  --border: #c7c7c7;
  --text: #1a1a1a;
  --muted: #6b6b6b;
  --correct-green: #15803d;
  --wrong-red: #b91c1c;
  --flag-orange: #d97706;
}
html, body {
  height: 100%;
  font-family: 'Public Sans', Helvetica, Arial, sans-serif;
  font-size: 16px;
  color: var(--text);
  background: var(--bg-page);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input { font-family: inherit; }

#app { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* TOP BAR */
.top-bar {
  display: grid; grid-template-columns: 1fr auto 1fr;
  align-items: center; background: #fff;
  border-bottom: 1px solid var(--border);
  height: 76px; padding: 0 14px; flex-shrink: 0; gap: 12px;
}
.left-cluster { display: flex; align-items: center; gap: 14px; min-width: 0; }
.zoom-btn {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--jk-navy); color: #fff; font-size: 22px;
  display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.zoom-btn:hover { background: var(--jk-navy-dark); }
.timer-block { display: flex; align-items: flex-start; gap: 8px; }
.timer-digits { display: flex; align-items: baseline; font-weight: 700; font-variant-numeric: tabular-nums; }
.timer-digits .num { font-size: 26px; line-height: 1; }
.timer-digits .colon { font-size: 22px; line-height: 1; padding: 0 1px; }
.timer-labels { display: flex; gap: 9px; margin-top: 4px; font-size: 11px; font-weight: 500; color: #444; }
.timer-block.warning .timer-digits { color: var(--flag-orange); }
.timer-block.danger .timer-digits { color: var(--wrong-red); animation: pulse 1s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
.hide-time-btn {
  background: var(--jk-navy); color: #fff;
  font-size: 11px; font-weight: 600;
  border-radius: 50%; width: 46px; height: 46px;
  display: inline-flex; align-items: center; justify-content: center;
  text-align: center; line-height: 1.05; padding: 4px;
  user-select: none; flex-shrink: 0;
}
.hide-time-btn:hover { background: var(--jk-navy-dark); }
.center-cluster {
  display: flex; align-items: center; justify-content: center;
  background: var(--header-bg); padding: 12px 24px;
  gap: 14px; min-width: 280px; height: 56px;
}
.center-cluster .q-title { font-size: 17px; font-weight: 600; color: #1a1a1a; }
.right-cluster { display: flex; justify-content: flex-end; align-items: center; padding-right: 8px; }
.jk-logo { display: inline-flex; align-items: center; gap: 10px; user-select: none; }
.jk-logo .mark {
  width: 46px; height: 46px;
  background: var(--jk-navy); color: #fff;
  display: inline-flex; align-items: center; justify-content: center;
  font-family: 'Lora', Georgia, serif; font-weight: 700; font-size: 22px;
  letter-spacing: -1px; border-radius: 4px; position: relative;
}
.jk-logo .mark::after {
  content: ""; position: absolute; bottom: 4px; right: 4px;
  width: 8px; height: 8px; background: var(--jk-gold); border-radius: 50%;
}
.jk-logo .text { display: flex; flex-direction: column; line-height: 1.05; }
.jk-logo .l1 { font-weight: 700; font-size: 14px; color: var(--jk-navy); letter-spacing: 0.5px; }
.jk-logo .l2 { font-weight: 600; font-size: 9px; color: var(--jk-navy); letter-spacing: 1.2px; margin-top: 3px; }

/* SECTION NAV */
.section-nav {
  display: flex; align-items: center;
  background: var(--jk-navy); color: #fff;
  border-bottom: 1px solid var(--jk-navy-dark);
  flex-shrink: 0; height: 44px;
  padding: 0 14px; gap: 0;
  overflow-x: auto;
}
.section-tab {
  padding: 0 18px; height: 100%;
  display: inline-flex; align-items: center;
  font-size: 14px; font-weight: 600;
  color: rgba(255,255,255,0.7);
  border-bottom: 3px solid transparent;
  white-space: nowrap;
  transition: all 0.15s;
}
.section-tab:hover { color: #fff; background: rgba(255,255,255,0.05); }
.section-tab.active {
  color: #fff;
  background: rgba(255,255,255,0.1);
  border-bottom-color: var(--jk-gold);
}
.section-tab .badge {
  display: inline-block;
  background: rgba(255,255,255,0.2);
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  margin-left: 8px;
  min-width: 36px;
  text-align: center;
}
.section-tab.active .badge {
  background: var(--jk-gold);
  color: var(--jk-navy);
}

/* CONTENT */
.content {
  flex: 1; display: flex;
  background: #fff;
  overflow: hidden; position: relative;
  min-height: 0;
}
.pane-left, .pane-right {
  flex: 1; overflow-y: auto;
  padding: 22px 30px 36px;
  position: relative; min-height: 0;
}
.pane-left { border-right: 1px solid var(--border); }

/* Single-pane layout for sections that don't need a passage on the side */
.content.single-pane .pane-left { border-right: none; }
.content.single-pane .pane-right { display: none; }

.section-header {
  font-family: 'Lora', Georgia, serif;
  font-size: 22px; font-weight: 600;
  color: var(--jk-navy);
  margin-bottom: 4px;
}
.section-subhead {
  font-size: 13px; color: var(--muted);
  margin-bottom: 14px; font-style: italic;
}
.passage-title {
  font-family: 'Lora', Georgia, serif;
  text-align: center; font-weight: 600;
  font-size: 22px; margin: 8px 0 16px;
  color: var(--jk-navy);
}
.passage-subtitle {
  text-align: center; font-style: italic;
  color: #555; font-size: 13.5px;
  margin-bottom: 22px;
}
.instruction {
  font-weight: 700; margin-bottom: 14px;
  font-size: 14.5px; line-height: 1.5;
}
.passage-body {
  font-size: 16px; line-height: 1.75;
}
.passage-body p { margin-bottom: 14px; }
.passage-body strong.bold-marker { font-weight: 700; }

/* MCQ QUESTIONS (used in A and C) */
.mcq-block {
  margin-bottom: 22px;
  padding-bottom: 18px;
  border-bottom: 1px solid #e8eaee;
}
.mcq-block:last-child { border-bottom: none; }
.mcq-stem {
  font-size: 15.5px;
  font-weight: 600;
  margin-bottom: 12px;
  line-height: 1.5;
  display: flex;
  gap: 8px;
}
.mcq-stem .q-num {
  color: var(--jk-navy);
  font-weight: 700;
  flex-shrink: 0;
  min-width: 32px;
}
.mcq-options { display: flex; flex-direction: column; gap: 6px; }
.mcq-option {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 9px 14px;
  border: 1.5px solid #c7c7c7;
  border-radius: 4px;
  background: #fff;
  cursor: pointer;
  transition: all 0.12s;
  font-size: 14.5px;
  line-height: 1.45;
}
.mcq-option:hover { background: #f0f5ff; border-color: var(--jk-navy); }
.mcq-option.selected {
  background: #e0ebff;
  border-color: var(--jk-navy);
  border-width: 2px;
  padding: 8px 13px;
}
.mcq-option .opt-letter {
  font-weight: 700;
  color: var(--jk-navy);
  background: #e7ecf2;
  border-radius: 3px;
  padding: 2px 8px;
  font-size: 13px;
  min-width: 24px;
  text-align: center;
  flex-shrink: 0;
}
.mcq-option.selected .opt-letter {
  background: var(--jk-navy);
  color: #fff;
}

/* CLOZE inline dropdown (Section B) */
.cloze-paragraph {
  font-size: 16px;
  line-height: 2;
  margin-bottom: 14px;
}
.cloze-gap {
  display: inline-block;
  margin: 0 3px;
  vertical-align: baseline;
  position: relative;
}
.cloze-gap-num {
  position: absolute;
  top: -16px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  font-weight: 700;
  color: var(--jk-navy);
  background: rgba(0,38,100,0.08);
  padding: 1px 6px;
  border-radius: 3px;
  white-space: nowrap;
}
.cloze-select {
  font-family: inherit;
  font-size: 15px;
  font-weight: 500;
  padding: 5px 26px 5px 10px;
  border: 1.5px solid #5a5a5a;
  border-radius: 3px;
  background: #fff;
  appearance: none;
  -webkit-appearance: none;
  cursor: pointer;
  min-width: 140px;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><polygon points='0,0 10,0 5,6' fill='%23002664'/></svg>");
  background-repeat: no-repeat;
  background-position: right 8px center;
}
.cloze-select:focus { outline: none; border-color: var(--jk-navy); border-width: 2px; padding: 4px 25px 4px 9px; }

/* POETRY (Section C) */
.poem-body {
  font-family: 'Lora', Georgia, serif;
  font-size: 16.5px;
  line-height: 1.7;
  white-space: pre-wrap;
  margin: 0 auto;
  max-width: 480px;
  padding: 6px 0;
}
.poem-body .stanza-break { display: block; height: 0.8em; }
.poem-body em { font-style: italic; }
.poem-body strong { font-weight: 700; }
.poem-title {
  font-family: 'Lora', Georgia, serif;
  text-align: center;
  font-size: 22px;
  font-weight: 600;
  color: var(--jk-navy);
  margin: 8px 0 6px;
}
.poem-subtitle {
  text-align: center;
  font-style: italic;
  color: #555;
  font-size: 13px;
  margin-bottom: 20px;
}

/* GAP TEXT (Section D) */
.gap-paragraph {
  font-size: 15.5px;
  line-height: 1.85;
  margin-bottom: 18px;
}
.gap-inline {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  vertical-align: middle;
  background: #fff;
  border: 2px dashed var(--gap-blue);
  border-radius: 3px;
  padding: 5px 10px;
  margin: 0 3px;
  min-width: 240px;
  min-height: 32px;
  font-size: 14px;
  color: #555;
  font-style: italic;
  transition: all 0.15s;
}
.gap-inline.drag-over {
  background: #fef3c7;
  border-color: var(--flag-orange);
  border-style: solid;
  transform: scale(1.02);
}
.gap-inline.filled {
  background: #e0ebff;
  border: 2px solid var(--jk-navy);
  color: var(--jk-navy);
  font-style: normal;
  font-weight: 500;
  cursor: pointer;
  min-width: 240px;
}
.gap-inline .gap-label {
  font-weight: 700;
  color: var(--jk-navy);
  background: rgba(0, 38, 100, 0.1);
  padding: 2px 7px;
  border-radius: 2px;
  font-size: 13px;
  font-style: normal;
  flex-shrink: 0;
}
.gap-inline.filled .gap-label { background: rgba(255,255,255,0.6); }
.gap-inline .gap-content {
  flex: 1;
  font-size: 14.5px;
  line-height: 1.4;
}
.gap-inline .gap-clear {
  background: rgba(255,255,255,0.7);
  color: #555;
  border-radius: 50%;
  width: 18px; height: 18px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 12px; flex-shrink: 0;
}
.gap-inline .gap-clear:hover { background: var(--wrong-red); color: #fff; }

.sentences-list { display: flex; flex-direction: column; gap: 10px; }
.sentence-card {
  border: 2px solid var(--gap-blue);
  background: #fff;
  border-radius: 4px;
  padding: 12px 14px;
  font-size: 14.5px;
  line-height: 1.5;
  color: #1a1a1a;
  cursor: grab;
  transition: all 0.12s;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  user-select: none;
}
.sentence-card:hover {
  background: #f0f5ff;
  border-color: var(--jk-navy);
  box-shadow: 0 2px 6px rgba(0,38,100,0.12);
}
.sentence-card:active { cursor: grabbing; }
.sentence-card.dragging { opacity: 0.4; cursor: grabbing; transform: scale(0.97); }
.sentence-card.placed { opacity: 0.4; cursor: not-allowed; pointer-events: none; background: #f1f5f9; }
.sentence-card .sent-letter {
  font-weight: 700; color: #fff;
  background: var(--jk-navy);
  border-radius: 3px;
  padding: 3px 9px;
  font-size: 14px;
  flex-shrink: 0;
  min-width: 26px;
  text-align: center;
}
.sentence-card .sent-text { flex: 1; font-weight: 500; }

.drag-hint {
  font-size: 12.5px;
  color: #6b6b6b;
  margin-bottom: 12px;
  font-style: italic;
}

/* EXTRACT MATCHING (Section E) */
.extract-tabs {
  display: flex; gap: 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 18px;
  flex-wrap: wrap;
}
.extract-tab {
  padding: 8px 20px;
  font-size: 15px;
  font-weight: 600;
  color: #1a1a1a;
  background: transparent;
  position: relative;
  top: 1px;
  border: 1px solid transparent;
  border-bottom: none;
}
.extract-tab.active {
  background: #fff;
  border: 1px solid var(--border);
  border-bottom: 1px solid #fff;
  color: var(--jk-navy);
}
.extract-tab:not(.active):hover { background: #f4f6f8; }
.extract-content { font-size: 15.5px; line-height: 1.6; }
.extract-content p { margin: 0 0 14px; }
.extract-content p:last-child { margin-bottom: 0; }
.extract-content .extract-label {
  font-weight: 700;
  font-size: 17px;
  margin-bottom: 8px;
  display: block;
  color: var(--jk-navy);
}

.em-statement-row {
  display: grid;
  grid-template-columns: 36px 1fr 90px;
  gap: 10px;
  align-items: flex-start;
  padding: 10px 0;
  border-bottom: 1px solid #e5e7eb;
}
.em-statement-row:last-child { border-bottom: none; }
.em-statement-num {
  font-weight: 700; color: var(--jk-navy);
  padding-top: 8px; font-size: 14.5px;
}
.em-statement-text {
  font-size: 14.5px; line-height: 1.45; padding-top: 4px;
}
.em-select select {
  font-family: inherit;
  font-size: 15px;
  padding: 7px 28px 7px 12px;
  border: 1.5px solid #5a5a5a;
  border-radius: 2px;
  background: #fff;
  appearance: none;
  -webkit-appearance: none;
  width: 100%;
  height: 34px;
  cursor: pointer;
  font-weight: 500;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><polygon points='0,0 10,0 5,6' fill='%23002664'/></svg>");
  background-repeat: no-repeat;
  background-position: right 8px center;
}

/* BOTTOM BAR */
.bottom-bar {
  display: flex; align-items: stretch;
  height: 60px; flex-shrink: 0;
  background: #fff;
  border-top: 1px solid var(--border);
}
.bottom-bar .btn {
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 15.5px; font-weight: 600;
  padding: 0 24px; gap: 8px; height: 100%;
}
.btn-prev, .btn-next {
  background: var(--jk-navy); color: #fff; min-width: 130px;
}
.btn-prev:hover, .btn-next:hover { background: var(--jk-navy-dark); }
.btn-prev { margin-right: auto; }
.btn-next { margin-left: auto; }
.btn-prev:disabled, .btn-next:disabled {
  opacity: 0.4; cursor: not-allowed;
  background: #888;
}
.btn-submit-final {
  background: var(--jk-gold);
  color: var(--jk-navy);
  margin-left: auto;
  min-width: 160px;
  font-weight: 700;
}
.btn-submit-final:hover { background: #b89348; color: #fff; }

/* Question grid (progress) */
.q-progress-strip {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  padding: 8px 14px;
  background: #f4f6f8;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  overflow-x: auto;
  align-items: center;
}
.q-progress-strip .label {
  font-size: 11px; font-weight: 700;
  color: var(--muted);
  margin-right: 8px;
  white-space: nowrap;
}
.q-pill {
  width: 26px; height: 26px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600;
  border-radius: 4px;
  background: #fff;
  border: 1px solid #c7c7c7;
  color: #555;
  cursor: pointer;
  transition: all 0.12s;
  flex-shrink: 0;
}
.q-pill:hover { background: #e7ecf2; }
.q-pill.answered {
  background: var(--jk-navy);
  color: #fff;
  border-color: var(--jk-navy);
}
.q-pill.current {
  outline: 2px solid var(--jk-gold);
  outline-offset: 1px;
}
.q-pill-divider {
  width: 1px; height: 18px;
  background: #c7c7c7;
  margin: 0 4px;
}

/* COVER / NAME ENTRY */
.cover-screen {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  padding: 40px 20px;
  background: var(--bg-page);
  overflow-y: auto; min-height: 0;
}
.cover-card {
  background: #fff;
  border: 3px solid var(--jk-navy);
  padding: 40px 48px;
  max-width: 600px; width: 100%;
  text-align: center;
  border-radius: 4px;
  box-shadow: 0 4px 24px rgba(0, 38, 100, 0.12);
}
.cover-card .brand-mark {
  display: inline-flex; align-items: center; justify-content: center;
  width: 60px; height: 60px;
  background: var(--jk-navy); color: #fff;
  font-family: 'Lora', Georgia, serif; font-weight: 700;
  font-size: 26px; border-radius: 6px;
  margin: 0 auto 18px; position: relative;
}
.cover-card .brand-mark::after {
  content: ""; position: absolute;
  bottom: 5px; right: 5px;
  width: 9px; height: 9px;
  background: var(--jk-gold); border-radius: 50%;
}
.cover-card h1 {
  font-family: 'Lora', Georgia, serif;
  font-size: 24px; font-weight: 600;
  margin-bottom: 6px; color: var(--jk-navy);
}
.cover-card .subtitle { font-size: 14.5px; color: #555; margin-bottom: 20px; }
.cover-card .question {
  font-size: 17px; font-weight: 600;
  margin-bottom: 14px; line-height: 1.4;
}
.cover-card .sub {
  font-size: 13px; margin-bottom: 26px;
  color: #555; line-height: 1.55;
}
.cover-actions {
  display: flex; gap: 16px;
  justify-content: center; flex-wrap: wrap;
}
.cover-actions button {
  background: var(--jk-navy); color: #fff;
  font-size: 15px; font-weight: 600;
  padding: 11px 32px; min-width: 120px;
  border-radius: 3px;
}
.cover-actions button:hover { background: var(--jk-navy-dark); }
.cover-actions button.secondary { background: #e5e8ec; color: #1a1a1a; }
.cover-actions button.secondary:hover { background: #d8dde2; }
.cover-actions button:disabled { opacity: 0.5; cursor: not-allowed; }
.name-input {
  width: 100%; font-size: 17px;
  padding: 13px 14px; border: 2px solid var(--border);
  border-radius: 3px; margin-bottom: 8px; text-align: center;
}
.name-input:focus { outline: none; border-color: var(--jk-navy); }
.name-hint { font-size: 12.5px; color: #888; margin-bottom: 22px; }
.section-overview {
  background: #f8f9fb;
  border-left: 3px solid var(--jk-navy);
  padding: 12px 16px;
  margin-bottom: 22px;
  text-align: left;
  font-size: 12.5px;
  line-height: 1.7;
}
.section-overview .row { display: flex; justify-content: space-between; gap: 8px; }
.section-overview .row strong { color: var(--jk-navy); min-width: 80px; }
.back-link {
  display: inline-block; margin-top: 18px;
  font-size: 13px; color: var(--muted);
  text-decoration: none;
}
.back-link:hover { color: var(--jk-navy); }

/* MODAL */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  animation: fadeIn 0.2s ease-out;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal-card {
  background: #fff;
  border: 3px solid var(--jk-navy);
  padding: 30px 36px;
  max-width: 520px;
  width: calc(100% - 40px);
  text-align: center;
  border-radius: 4px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  animation: slideUp 0.25s ease-out;
}
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-card.warning { border-color: var(--flag-orange); }

<p>Cloudwool Morning came once a month, when the Skylings — the small soft creatures who lived above the cliff — dropped their old wool through the chimney for Nana Bly to weave into blankets. The Skylings were exactly punctual. They came on the second Wednesday of every month, never late, never early, and Nana had been catching their wool since she was Wren's age.</p>

<p>Tin-tin, the lighthouse cat, sniffed the dark grey bundle, sneezed, and walked away as though the bundle had personally insulted him.</p>
<p>'A Drifter,' Nana Bly said, when she saw it.</p>
<p>'A what?' said Wren.</p>
<p>Nana sat down at the table. She did not, Wren noticed, sit down the way she usually did, which was with a small grunt and a stretching of one knee. She sat down the way someone sits when they have had a piece of news.</p>
<p>'A Drifter is a Skyling who has not kept its promises,' Nana said. 'Every Skyling makes a Quill-mark when it comes of age — a kind of contract about how it will behave. A Drifter is one that has wandered off the agreed paths. The wool is always like that — dark, off-colour, full of bits of cloud the Skyling shouldn't have flown through.'</p>
<p>'Is that bad?' Wren asked.</p>
<p>'It is mostly only bad for the Drifter,' Nana said. 'But it can be a small problem for whoever catches the wool.'</p>
<p>She did not explain what the small problem was.</p>
<p>Tin-tin, who had been watching the conversation from the top of the bread bin, gave Wren <strong>a look that the cat himself would have described, if anyone had asked him, as deeply meaningful</strong>. Wren, however, was eleven and not always good at reading cats.</p>
<p>There was a knock at the door.</p>
<p>It was Mr Quill, the postman, who came once a week with letters from the mainland and stayed for a cup of Hush-tea before climbing back down the cliff path. Today he had a letter for Nana with a red Pip-bell stamp on the corner — the kind of stamp used only for messages from the Skyling Council.</p>
<p>'I think this might be about your morning bundle,' Mr Quill said, and looked at the dark grey Cloudwool on the floor with a small, interested whistle.</p>
<p>Nana opened the letter. She read it once. She read it again. She folded it and put it in the pocket of her apron.</p>
<p>Then she stood up and said, in a voice Wren had never quite heard her use before, 'Wren, my love, would you and Tin-tin go and ask Mrs Pip if she has <strong>any extra light</strong>?'</p>

the boy who did not speak.
His pencil moved when others' moved.
His book opened when others' opened.
But his mouth stayed closed.

Someone seeing him
might think him empty,
might think him bored,
might say he had nothing to add.

No. He was full.
<strong>He was full of waiting.</strong>
He was full of the kind of thinking
that does not need to be heard to happen.

We did not know this then.
We thought he was the quiet one.
We thought he was the dull one.
We were wrong about that, all of us.

One Wednesday, in science,
the teacher held up a glass of water
and asked us why ice floats.
We said the things we always said.

Then the boy lifted his hand —
<strong>the way you lift a leaf</strong> —
and asked: 'What if water is the only thing
that gets bigger when it freezes?'

The teacher stopped. She said: yes.
She said: that's the question.
She said: that is exactly the question.

We had been talking around it for years.
He had been listening for years.

<p>When two groups who share no common language are brought into prolonged contact, they typically develop a pidgin — a stripped-down communication system that borrows words from both languages but follows no consistent grammatical rules. {{20}} The need to communicate drives linguistic invention even when speakers have no formal training and no shared starting point. What surprised researchers was not that pidgins formed, but how quickly they could develop into something more complex. A pidgin is not a complete language: it lacks the grammatical structure needed to express complicated ideas, and its speakers use it as a temporary bridge rather than a mother tongue. What happens next, linguists have observed, is more interesting. {{21}} Within a generation, what began as improvised communication has typically become a creole — a full language, with consistent grammar, capable of expressing anything its speakers need to say.</p>
<p>The role of children in this transformation is decisive. When both adults and children are exposed to a pidgin, it is the children who drive the development of the creole — not the adults. {{22}} By the time the first generation of native creole speakers had grown up, the language they used was more grammatically consistent than anything the adults around them had produced. In the hands of children, it had become something new.</p>
<p>The same pattern of age effects appears when people learn established languages rather than creating new ones. Studies of immigrant communities consistently find that age at arrival in a new country is among the strongest predictors of how well a person will eventually acquire the local language. {{23}} The gap did not appear to be about effort or motivation. Adults who studied intensively and immersed themselves in the language for years still fell short of the fluency that children appeared to acquire almost without trying.</p>

/* === SCROLL PRESERVATION (drag-drop) === */
function _scrollMap() {
  const m = new Map();
  document.querySelectorAll('.pane-left, .pane-right').forEach((el, i) => {
    const key = el.className + '|' + i;
    m.set(key, el.scrollTop);
  });
  return m;
}
function _applyScroll(m) {
  if (!m || m.size === 0) return;
  const apply = () => {
    document.querySelectorAll('.pane-left, .pane-right').forEach((el, i) => {
      const key = el.className + '|' + i;
      if (m.has(key)) el.scrollTop = m.get(key);
    });
  };
  requestAnimationFrame(() => requestAnimationFrame(apply));
}
function renderPreservingScroll() {
  const positions = _scrollMap();
  render();
  _applyScroll(positions);
}

  pills += '</div>';

  const sec = SECTIONS.find(s => s.id === STATE.currentSection);
  let content = '';
  let isSinglePane = false;
  switch (sec.type) {
    case 'mcq-passage': content = renderSectionA(); break;
    case 'cloze':       content = renderSectionB(); isSinglePane = true; break;
    case 'mcq-poem':    content = renderSectionC(); break;
    case 'gap-text':    content = renderSectionD(); break;
    case 'extract-match': content = renderSectionE(); break;
  }

  // Find current section index for prev/next nav
  const idx = SECTIONS.findIndex(s => s.id === sec.id);
  const isFirst = idx === 0;
  const isLast = idx === SECTIONS.length - 1;

  root.innerHTML = `
    ${topBar()}
    ${sectionNav()}
    ${questionStrip()}
    <div class="content${isSinglePane ? ' single-pane' : ''}">${content}</div>
    <div class="bottom-bar">
      <button class="btn btn-prev" ${isFirst ? 'disabled' : ''} onclick="prevSection()">← Previous</button>
      ${isLast
        ? '<button class="btn btn-submit-final" onclick="goSubmit()">Submit Test ▸</button>'
        : '<button class="btn btn-next" onclick="nextSection()">Next →</button>'}
    </div>`;
}

/* ============================================================
   SECTION A · MCQ on passage
   ============================================================ */
function renderSectionA() {
  const left = `
    <div class="section-header">Section A · The Day the Drifter Came</div>
    <div class="section-subhead">Read the text below, then answer Questions 1–6 on the right.</div>
    <div class="passage-title">${SECTION_A.passageTitle}</div>
    <div class="passage-subtitle"><em>${escapeHtml(SECTION_A.passageSubtitle)}</em></div>
    <div class="passage-body">${SECTION_A.passageHtml}</div>`;

  const right = `
    <div class="section-header">Questions 1–6</div>
    <div class="section-subhead">Choose the option (A, B, C or D) you think best answers each question.</div>
    ${SECTION_A.questions.map(q => mcqBlock(q)).join('')}`;

  return `<div class="pane-left">${left}</div><div class="pane-right">${right}</div>`;
}

function mcqBlock(q) {
  const sel = STATE.answers[q.qNum] || '';
  return `<div class="mcq-block">
    <div class="mcq-stem"><span class="q-num">${q.qNum}.</span><span>${escapeHtml(q.stem)}</span></div>
    <div class="mcq-options">
      ${['A','B','C','D'].map(L => `
        <div class="mcq-option ${sel === L ? 'selected' : ''}" onclick="setMcqAnswer(${q.qNum}, '${L}')">
          <span class="opt-letter">${L}</span>
          <span>${escapeHtml(q.options[L])}</span>
        </div>
      `).join('')}
    </div>
  </div>`;
}

function setMcqAnswer(qNum, letter) {
  STATE.answers[qNum] = letter;
  // Update visuals without re-rendering everything (preserves scroll naturally)
  const block = event.currentTarget.closest('.mcq-block');
  if (block) {
    block.querySelectorAll('.mcq-option').forEach(el => el.classList.remove('selected'));
    event.currentTarget.classList.add('selected');
  }
  // Update progress strip lightly
  updateProgressStripVisual();
  updateSectionBadges();
}

/* ============================================================
   SECTION B · Cloze (inline dropdowns) — single pane
   ============================================================ */
function renderSectionB() {
  let body = SECTION_B.bodyHtml.replace(/\{\{(\d+)\}\}/g, (_, qNum) => {
    const q = SECTION_B.gaps.find(g => g.qNum === Number(qNum));
    const sel = STATE.answers[qNum] || '';
    const optionsHtml = ['A','B','C','D'].map(L =>
      `<option value="${L}" ${sel === L ? 'selected' : ''}>${escapeHtml(q.options[L])}</option>`
    ).join('');
    return `<span class="cloze-gap">
      <span class="cloze-gap-num">Q${qNum}</span>
      <select class="cloze-select" onchange="setClozeAnswer(${qNum}, this.value)">
        <option value="" ${!sel ? 'selected' : ''}>— select —</option>
        ${optionsHtml}
      </select>
    </span>`;
  });

  return `<div class="pane-left" style="max-width: 900px; margin: 0 auto;">
    <div class="section-header">Section B · ${SECTION_B.passageTitle}</div>
    <div class="section-subhead">Read the text below and select the correct word for each gap. <em>${SECTION_B.passageSubtitle}</em></div>
    <div class="cloze-paragraph">${body}</div>
  </div>`;
}

function setClozeAnswer(qNum, letter) {
  if (!letter) {
    delete STATE.answers[qNum];
  } else {
    STATE.answers[qNum] = letter;
  }
  updateProgressStripVisual();
  updateSectionBadges();
}

/* ============================================================
   SECTION C · Poetry MCQ
   ============================================================ */
function renderSectionC() {
  // Poem with stanza breaks (blank lines preserved)
  const poemHtml = SECTION_C.poemHtml
    .split('\n\n')
    .map(stanza => `<div style="margin-bottom: 14px;">${stanza.replace(/\n/g, '<br>')}</div>`)
    .join('');

  const left = `
    <div class="section-header">Section C · Poem</div>
    <div class="section-subhead">Read the poem, then answer Questions 15–19. For Q19 consider the poem as a whole.</div>
    <div class="poem-title">${SECTION_C.poemTitle}</div>
    <div class="poem-subtitle"><em>${SECTION_C.poemSubtitle}</em></div>
    <div class="poem-body">${poemHtml}</div>`;

  const right = `
    <div class="section-header">Questions 15–19</div>
    <div class="section-subhead">Choose the option (A, B, C or D) you think best answers each question.</div>
    ${SECTION_C.questions.map(q => mcqBlock(q)).join('')}`;

  return `<div class="pane-left">${left}</div><div class="pane-right">${right}</div>`;
}

/* ============================================================
   SECTION D · Gap Text (drag sentences into inline gaps)
   ============================================================ */
function renderSectionD() {
  const placedSet = new Set(Object.values(STATE.answers).filter(v => /^[A-G]$/.test(v)));

  let bodyHtml = SECTION_D.bodyHtml.replace(/\{\{(\d+)\}\}/g, (_, qNum) => {
    const sel = STATE.answers[qNum];
    if (sel && /^[A-G]$/.test(sel)) {
      const sent = SECTION_D.sentences.find(s => s.letter === sel);
      const previewShort = sent.text.length > 70 ? sent.text.slice(0, 70) + '…' : sent.text;
      return `<span class="gap-inline filled"
                    data-gap="${qNum}"
                    ondragover="gapDragOver(event, '${qNum}')"
                    ondragleave="gapDragLeave(event)"
                    ondrop="gapDrop(event, '${qNum}')">
        <span class="gap-label">Q.${qNum}</span>
        <span class="gap-content"><strong>${sel}.</strong> ${escapeHtml(previewShort)}</span>
        <span class="gap-clear" onclick="clearGap('${qNum}'); event.stopPropagation();" title="Remove">✕</span>
      </span>`;
    }
    return `<span class="gap-inline"
                  data-gap="${qNum}"
                  ondragover="gapDragOver(event, '${qNum}')"
                  ondragleave="gapDragLeave(event)"
                  ondrop="gapDrop(event, '${qNum}')">
      <span class="gap-label">Q.${qNum}</span>
      <span class="gap-content">______________________</span>
    </span>`;
  });

  const sentencesHtml = SECTION_D.sentences.map(s => {
    const placed = placedSet.has(s.letter);
    return `<div class="sentence-card ${placed ? 'placed' : ''}"
                  draggable="${placed ? 'false' : 'true'}"
                  ondragstart="sentDragStart(event, '${s.letter}')"
                  ondragend="sentDragEnd(event)">
      <span class="sent-letter">${s.letter}</span>
      <span class="sent-text">${escapeHtml(s.text)}</span>
    </div>`;
  }).join('');

  const left = `
    <div class="section-header">Section D · ${SECTION_D.passageTitle}</div>
    <div class="section-subhead">Six sentences have been removed from the text. Drag each sentence (A–G) into the matching gap. One sentence is extra.</div>
    <div class="passage-body">${bodyHtml}</div>`;

  const right = `
    <div class="section-header">Sentences A–G</div>
    <div class="drag-hint">Drag each sentence onto the gap (Q.20–Q.25) where it best fits.</div>
    <div class="sentences-list">${sentencesHtml}</div>`;

  return `<div class="pane-left">${left}</div><div class="pane-right">${right}</div>`;
}

function sentDragStart(ev, letter) {
  STATE.draggingSentence = letter;
  ev.dataTransfer.effectAllowed = 'move';
  try { ev.dataTransfer.setData('text/plain', letter); } catch (_) {}
  ev.currentTarget.classList.add('dragging');
}
function sentDragEnd(ev) {
  ev.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.gap-inline.drag-over').forEach(el => el.classList.remove('drag-over'));
}
function gapDragOver(ev, qNum) {
  ev.preventDefault();
  ev.dataTransfer.dropEffect = 'move';
  ev.currentTarget.classList.add('drag-over');
}
function gapDragLeave(ev) {
  ev.currentTarget.classList.remove('drag-over');
}
function gapDrop(ev, qNum) {
  ev.preventDefault();
  ev.currentTarget.classList.remove('drag-over');
  let letter = STATE.draggingSentence;
  if (!letter) {
    const txt = ev.dataTransfer.getData('text/plain');
    if (txt) letter = txt;
  }
  if (!letter) return;
  // Remove this letter from any other gap
  Object.keys(STATE.answers).forEach(k => {
    if (STATE.answers[k] === letter) delete STATE.answers[k];
  });
  STATE.answers[qNum] = letter;
  STATE.draggingSentence = null;
  renderPreservingScroll();
}
function clearGap(qNum) {
  delete STATE.answers[qNum];
  renderPreservingScroll();
}

/* ============================================================
   SECTION E · Extract matching (4 extracts in tabs + 8 dropdowns)
   ============================================================ */
function renderSectionE() {
  const idx = STATE.activeExtract;
  const activeExtract = SECTION_E.extracts[idx];

  const tabs = SECTION_E.extracts.map((ex, i) =>
    `<button class="extract-tab ${i === idx ? 'active' : ''}" onclick="setActiveExtract(${i})">${ex.label}</button>`
  ).join('');

  const stmts = SECTION_E.statements.map(st => {
    const sel = STATE.answers[st.qNum] || '';
    return `<div class="em-statement-row">
      <div class="em-statement-num">${st.qNum}.</div>
      <div class="em-statement-text">${escapeHtml(st.text)}</div>
      <div class="em-select">
        <select onchange="setExtractAnswer(${st.qNum}, this.value)">
          <option value="" ${!sel ? 'selected' : ''}>—</option>
          <option value="A" ${sel === 'A' ? 'selected' : ''}>A</option>
          <option value="B" ${sel === 'B' ? 'selected' : ''}>B</option>
          <option value="C" ${sel === 'C' ? 'selected' : ''}>C</option>
          <option value="D" ${sel === 'D' ? 'selected' : ''}>D</option>
        </select>
      </div>
    </div>`;
  }).join('');

  const left = `
    <div class="section-header">Section E · Doors</div>
    <div class="section-subhead">Read the four extracts on the theme of doors. For each question on the right, choose the extract (A, B, C or D). An extract may be used more than once.</div>
    <div class="extract-tabs">${tabs}</div>
    <div class="extract-content">${activeExtract.html}</div>`;

  const right = `
    <div class="section-header">Questions 26–33</div>
    <div class="section-subhead">Which extract…</div>
    ${stmts}`;

  return `<div class="pane-left">${left}</div><div class="pane-right">${right}</div>`;
}

function setActiveExtract(i) {
  STATE.activeExtract = i;
  renderPreservingScroll();
}

function setExtractAnswer(qNum, value) {
  if (!value) {
    delete STATE.answers[qNum];
  } else {
    STATE.answers[qNum] = value;
  }
  updateProgressStripVisual();
  updateSectionBadges();
}

/* ============================================================
   PROGRESS STRIP / BADGES — light update without full re-render
   ============================================================ */
function updateProgressStripVisual() {
  for (let q = 1; q <= 33; q++) {
    const pill = document.querySelector(`.q-pill:nth-of-type(${q + 1})`); // +1 because of label
    // simpler: query by text content
  }
  document.querySelectorAll('.q-progress-strip .q-pill').forEach((pill, idx) => {
    const qNum = Number(pill.textContent);
    if (qNum >= 1 && qNum <= 33) {
      if (STATE.answers[qNum]) pill.classList.add('answered');
      else pill.classList.remove('answered');
    }
  });
}
function updateSectionBadges() {
  document.querySelectorAll('.section-tab').forEach(tab => {
    const m = tab.textContent.match(/Q(\d+)–(\d+)/);
    if (!m) return;
    const start = Number(m[1]), end = Number(m[2]);
    const answered = countAnswered(start, end);
    const total = end - start + 1;
    const badge = tab.querySelector('.badge');
    if (badge) badge.textContent = `${answered}/${total}`;
  });
}
function countAnswered(start, end) {
  let n = 0;
  for (let q = start; q <= end; q++) if (STATE.answers[q]) n++;
  return n;
}

/* ============================================================
   NAVIGATION
   ============================================================ */
function switchSection(id) {
  STATE.currentSection = id;
  STATE.activeExtract = 0;  // reset E tab
  render();
  // scroll panes to top
  setTimeout(() => {
    document.querySelectorAll('.pane-left, .pane-right').forEach(el => el.scrollTop = 0);
  }, 0);
}
function prevSection() {
  const idx = SECTIONS.findIndex(s => s.id === STATE.currentSection);
  if (idx > 0) switchSection(SECTIONS[idx - 1].id);
}
function nextSection() {
  const idx = SECTIONS.findIndex(s => s.id === STATE.currentSection);
  if (idx < SECTIONS.length - 1) switchSection(SECTIONS[idx + 1].id);
}
function jumpToQuestion(qNum) {
  const sec = ALL_QUESTIONS[qNum].sectionId;
  if (STATE.currentSection !== sec) {
    switchSection(sec);
  }
}

/* ============================================================
   SUBMIT / TIMER
   ============================================================ */
function goSubmit() { STATE.screen = 'submitConfirm'; render(); }
function cancelSubmit() {
  STATE.screen = 'test';
  document.getElementById('submitModal')?.remove();
}
function finalizeSubmit() {
  stopTimer();
  STATE.finishedAt = Date.now();
  STATE.screen = 'submitted';
  document.getElementById('submitModal')?.remove();
  document.getElementById('timeUpModal')?.remove();
  uploadResults();
  render();
}
function goConfirm() { if (!STATE.studentName.trim()) return; STATE.screen = 'confirm'; render(); }
function startTest() {
  STATE.screen = 'test';
  STATE.startedAt = Date.now();
  startTimer();
  render();
}
function goReview() { STATE.screen = 'review'; render(); }
function exitReview() { STATE.screen = 'submitted'; render(); }
function toggleSolution(qNum) {
  STATE.showSolution[qNum] = !STATE.showSolution[qNum];
  render();
}
function restartTest() {
  if (!confirm('Restart the test? All answers will be cleared.')) return;
  STATE.screen = 'name';
  STATE.studentName = '';
  STATE.timerSeconds = TEST_META.durationSeconds;
  STATE.timerHidden = false;
  STATE.currentSection = 'A';
  STATE.activeExtract = 0;
  STATE.answers = {};
  STATE.draggingSentence = null;
  STATE.showSolution = {};
  STATE.uploadStatus = 'pending';
  STATE.startedAt = null;
  STATE.finishedAt = null;
  stopTimer();
  render();
}
function goHome() {
  if (STATE.screen === 'test' && Object.keys(STATE.answers).length > 0) {
    if (!confirm('Leave the test? Your progress will be lost.')) return;
  }
  window.location.href = '../';
}

function startTimer() {
  stopTimer();
  timerInterval = setInterval(() => {
    STATE.timerSeconds--;
    if (STATE.timerSeconds <= 0) {
      stopTimer();
      STATE.timerSeconds = 0;
      STATE.screen = 'timeUp';
      render();
      return;
    }
    updateTimerDisplay();
  }, 1000);
}
function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }
function updateTimerDisplay() {
  const el = document.querySelector('.timer-digits');
  if (el) el.innerHTML = formatTimer();
  const block = document.querySelector('.timer-block');
  if (block) {
    block.classList.remove('warning', 'danger');
    if (STATE.timerSeconds <= 60) block.classList.add('danger');
    else if (STATE.timerSeconds <= 300) block.classList.add('warning');
  }
}
function formatTimer() {
  const h = Math.floor(STATE.timerSeconds / 3600);
  const m = Math.floor((STATE.timerSeconds % 3600) / 60);
  const s = STATE.timerSeconds % 60;
  const pad = n => String(n).padStart(2, '0');
  return `<span class="num">${pad(h)}</span><span class="colon">:</span><span class="num">${pad(m)}</span><span class="colon">:</span><span class="num">${pad(s)}</span>`;
}
function toggleHideTime() { STATE.timerHidden = !STATE.timerHidden; render(); }
function zoomToggle() {
  const cur = parseFloat(document.body.style.zoom || '1');
  document.body.style.zoom = cur >= 1.2 ? '1' : (cur + 0.1).toFixed(1);
}

function renderSubmitModal() {
  const unanswered = [];
  for (let q = 1; q <= 33; q++) {
    if (!STATE.answers[q]) unanswered.push(q);
  }
  const modal = document.createElement('div');
  modal.className = 'modal-bg';
  modal.id = 'submitModal';
  let unansweredHtml = '';
  if (unanswered.length > 0) {
    unansweredHtml = `<div class="unanswered-list">
      <strong>Unanswered:</strong> Q${unanswered.join(', Q')}
    </div>`;
  }
  modal.innerHTML = `<div class="modal-card">
    <h2>Submit your test?</h2>
    <p>${unanswered.length > 0
        ? `You have <strong>${unanswered.length}</strong> unanswered question${unanswered.length > 1 ? 's' : ''}.`
        : 'You have answered all 33 questions.'}<br>
      Once submitted, you cannot change your answers.</p>
    ${unansweredHtml}
    <div class="modal-actions">
      <button class="secondary" onclick="cancelSubmit()">Go back</button>
      <button onclick="finalizeSubmit()">Submit</button>
    </div>
  </div>`;
  document.body.appendChild(modal);
}

function renderTimeUpModal() {
  const modal = document.createElement('div');
  modal.className = 'modal-bg';
  modal.id = 'timeUpModal';
  modal.innerHTML = `<div class="modal-card warning">
    <h2>⏰ Time's up!</h2>
    <p>The 30 minutes are over. Your test will be submitted automatically.</p>
    <div class="modal-actions"><button onclick="finalizeSubmit()">View Results</button></div>
  </div>`;
  document.body.appendChild(modal);
}

/* ============================================================
   RESULTS / REVIEW
   ============================================================ */
function computeScore() {
  let total = 0;
  const sectionScores = { A: 0, B: 0, C: 0, D: 0, E: 0 };
  for (let q = 1; q <= 33; q++) {
    const correct = ALL_QUESTIONS[q].correct;
    if (STATE.answers[q] === correct) {
      total++;
      sectionScores[ALL_QUESTIONS[q].sectionId]++;
    }
  }
  return { total, max: 33, sectionScores };
}

function renderResults() {
  const score = computeScore();
  const elapsed = Math.floor((STATE.finishedAt - STATE.startedAt) / 1000);
  const min = Math.floor(elapsed / 60);
  const sec = elapsed % 60;
  const pct = Math.round((score.total / score.max) * 100);

  let uploadHtml = '';
  if (STATE.uploadStatus === 'pending') uploadHtml = `<div class="upload-status">Saving results to teacher dashboard…</div>`;
  else if (STATE.uploadStatus === 'success') uploadHtml = `<div class="upload-status success">✓ Results saved to teacher dashboard</div>`;
  else if (STATE.uploadStatus === 'error') uploadHtml = `<div class="upload-status error">Could not save automatically. Please notify your teacher of your score.</div>`;

  const sectionRanges = { A: '6', B: '8', C: '5', D: '6', E: '8' };

  root.innerHTML = `
    ${topBarSimple('Test Complete')}
    <div class="results-screen">
      <div class="results-card">
        <h1>Well Done!</h1>
        <div class="student-line"><strong>${escapeHtml(STATE.studentName)}</strong> · ${TEST_META.title}</div>
        <div class="score-display">
          <span class="score">${score.total}</span>
          <span class="total">/ ${score.max}</span>
        </div>
        <div class="score-pct">${pct}%</div>
        <div class="score-time">Time taken: ${min}m ${sec}s</div>
        <div class="section-scores">
          ${SECTIONS.map(s => `
            <div class="section-score-cell">
              <div class="label">SECTION ${s.id}</div>
              <div class="val">${score.sectionScores[s.id]}<span class="max">/${sectionRanges[s.id]}</span></div>
            </div>
          `).join('')}
        </div>
        <div class="results-actions">
          <button onclick="goReview()">Review Answers</button>
          <button class="secondary" onclick="restartTest()">Restart</button>
          <button class="secondary" onclick="goHome()">Home</button>
        </div>
        ${uploadHtml}
      </div>
    </div>`;
}

function renderReview() {
  const score = computeScore();
  let sectionsHtml = '';

  SECTIONS.forEach(sec => {
    sectionsHtml += `<h2 class="review-section-title">Section ${sec.id} · ${sec.range}</h2>`;
    for (let q = sec.start; q <= sec.end; q++) {
      sectionsHtml += reviewRow(q);
    }
  });

  // Add note about extra option for Section D
  sectionsHtml += `<div class="review-row" style="border-left-color: var(--jk-gold);">
    <div class="header"><span class="qref">Section D · Note: unused option (B)</span></div>
    <div class="solution-panel"><p>${escapeHtml(SECTION_D.extraNote)}</p></div>
  </div>`;

  root.innerHTML = `
    <div class="review-banner">
      <div class="info">
        <span>Reviewing</span>
        <span class="badge">${score.total} / ${score.max}</span>
      </div>
      <div><button onclick="exitReview()">← Back to Results</button></div>
    </div>
    <div class="review-content">
      <div class="review-content-inner">${sectionsHtml}</div>
    </div>`;
}

function reviewRow(qNum) {
  const q = ALL_QUESTIONS[qNum];
  const userAns = STATE.answers[qNum];
  const correct = q.correct;
  const isCorrect = userAns === correct;
  let statusBadge, rowCls;
  if (!userAns) {
    statusBadge = `<span class="review-status wrong">NOT ANSWERED</span>`;
    rowCls = 'wrong';
  } else if (isCorrect) {
    statusBadge = `<span class="review-status correct">✓ CORRECT</span>`;
    rowCls = 'correct';
  } else {
    statusBadge = `<span class="review-status wrong">✕ INCORRECT</span>`;
    rowCls = 'wrong';
  }

  // Get stem and answers
  let stem = '', userText = '', correctText = '';
  if (q.sectionId === 'A' || q.sectionId === 'C') {
    stem = q.stem;
    userText = userAns ? `${userAns}. ${q.options[userAns]}` : '';
    correctText = `${correct}. ${q.options[correct]}`;
  } else if (q.sectionId === 'B') {
    stem = `Cloze gap: select the best word`;
    userText = userAns ? `${userAns}. ${q.options[userAns]}` : '';
    correctText = `${correct}. ${q.options[correct]}`;
  } else if (q.sectionId === 'D') {
    stem = `Gap sentence`;
    const userSent = userAns ? SECTION_D.sentences.find(s => s.letter === userAns) : null;
    const corrSent = SECTION_D.sentences.find(s => s.letter === correct);
    userText = userSent ? `${userAns}. ${userSent.text}` : '';
    correctText = `${correct}. ${corrSent.text}`;
  } else if (q.sectionId === 'E') {
    stem = `Which extract ${q.text}`;
    userText = userAns || '';
    correctText = `Extract ${correct}`;
  }

  const isOpen = STATE.showSolution[qNum];

  return `<div class="review-row ${rowCls}">
    <div class="header">
      <span class="qref">Q${qNum}</span>
      ${statusBadge}
    </div>
    <div class="stem">${escapeHtml(stem)}</div>
    ${userAns && !isCorrect ? `<div class="answer-line user-ans"><strong>Your answer:</strong> ${escapeHtml(userText)}</div>` : ''}
    <div class="answer-line correct-ans"><strong>Correct:</strong> ${escapeHtml(correctText)}</div>
    <button class="solution-toggle-btn" onclick="toggleSolution(${qNum})">
      ${isOpen ? '▲ Hide solution' : '💡 Show solution'}
    </button>
    ${isOpen ? `<div class="solution-panel">
      <h4>Why this is correct</h4>
      <p>${q.solution.evidence}</p>
      <h4>Why not the others</h4>
      <p>${q.solution.whyNot}</p>
    </div>` : ''}
  </div>`;
}

/* ============================================================
   UPLOAD
   ============================================================ */
function uploadResults() {
  if (!GOOGLE_SHEETS_URL) {
    STATE.uploadStatus = 'disabled';
    return;
  }
  const score = computeScore();
  const elapsed = Math.floor((STATE.finishedAt - STATE.startedAt) / 1000);
  const answersStr = [];
  for (let q = 1; q <= 33; q++) {
    const u = STATE.answers[q] || '-';
    const c = ALL_QUESTIONS[q].correct;
    answersStr.push(`Q${q}:${u}(${c})`);
  }

  const payload = {
    studentName: STATE.studentName,
    setName: TEST_META.testId,
    timestamp: new Date().toISOString(),
    timestampLocal: new Date().toLocaleString('en-AU', { timeZone: 'Australia/Sydney' }),
    totalScore: score.total,
    totalPossible: score.max,
    percentage: Math.round((score.total / score.max) * 100),
    timeTakenSeconds: elapsed,
    timeTakenFormatted: `${Math.floor(elapsed/60)}m ${elapsed%60}s`,
    sectionA: score.sectionScores.A + '/6',
    sectionB: score.sectionScores.B + '/8',
    sectionC: score.sectionScores.C + '/5',
    sectionD: score.sectionScores.D + '/6',
    sectionE: score.sectionScores.E + '/8',
    answers: answersStr.join(' | ')
  };

  STATE.uploadStatus = 'pending';
  render();

  fetch(GOOGLE_SHEETS_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(payload)
  }).then(() => {
    STATE.uploadStatus = 'success';
    if (STATE.screen === 'submitted') render();
  }).catch(() => {
    STATE.uploadStatus = 'error';
    if (STATE.screen === 'submitted') render();
  });
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"
  }[c]));
}

render();
</script>
