<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Multiple Extracts — Kindness</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --jk-navy: #002664;
  --jk-navy-dark: #001a47;
  --jk-gold: #c9a55c;
  --bg-page: #d6d8db;
  --header-bg: #e7ecf2;
  --border: #c7c7c7;
  --text: #1a1a1a;
  --muted: #6b6b6b;
  --correct-green: #15803d;
  --wrong-red: #b91c1c;
  --flag-orange: #d97706;
}
html, body {
  height: 100%;
  font-family: 'Public Sans', Helvetica, Arial, sans-serif;
  font-size: 16px;
  color: var(--text);
  background: var(--bg-page);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input { font-family: inherit; }

#app { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

.top-bar {
  display: grid; grid-template-columns: 1fr auto 1fr;
  align-items: center; background: #ffffff;
  border-bottom: 1px solid var(--border);
  height: 76px; padding: 0 14px; flex-shrink: 0; gap: 12px;
}
.left-cluster { display: flex; align-items: center; gap: 14px; min-width: 0; }
.zoom-btn {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--jk-navy); color: white; font-size: 22px;
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.zoom-btn:hover { background: var(--jk-navy-dark); }
.timer-block { display: flex; align-items: flex-start; gap: 8px; }
.timer-digits { display: flex; align-items: baseline; font-weight: 700; font-variant-numeric: tabular-nums; }
.timer-digits .num { font-size: 26px; line-height: 1; }
.timer-digits .colon { font-size: 22px; line-height: 1; padding: 0 1px; }
.timer-labels { display: flex; gap: 9px; margin-top: 4px; font-size: 11px; font-weight: 500; color: #444; }
.timer-block.warning .timer-digits { color: var(--flag-orange); }
.timer-block.danger .timer-digits { color: var(--wrong-red); animation: pulse 1s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
.hide-time-btn {

  font-size: 11px; font-weight: 600;
  border-radius: 50%; width: 46px; height: 46px;
  display: inline-flex; align-items: center; justify-content: center;
  text-align: center; line-height: 1.05; padding: 4px;

}
.hide-time-btn:hover { background: var(--jk-navy-dark); }
.center-cluster {

.right-cluster { display: flex; justify-content: flex-end; align-items: center; padding-right: 8px; }
.jk-logo { display: inline-flex; align-items: center; gap: 10px; user-select: none; }
.jk-logo .mark {

  display: inline-flex; align-items: center; justify-content: center;

}
.jk-logo .mark::after {
  content: ""; position: absolute; bottom: 4px; right: 4px;

}
.jk-logo .text { display: flex; flex-direction: column; line-height: 1.05; }

.content {

}

/* Extract tabs */
.extract-tabs {
  display: flex; gap: 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 18px;
  flex-wrap: wrap;
}
.extract-tab {
  padding: 8px 20px;
  font-size: 14px;
  font-weight: 600;
  color: #1a1a1a;
  background: transparent;
  position: relative;
  top: 1px;
  border: 1px solid transparent;
  border-bottom: none;
}
.extract-tab.active {
  background: #ffffff;
  border: 1px solid var(--border);
  border-bottom: 1px solid #ffffff;
  color: var(--jk-navy);
}
.extract-tab:not(.active):hover { background: #f4f6f8; }

.extract-instruction {
  font-weight: 700;
  margin-bottom: 12px;

}
.extract-content { font-size: 13.5px; line-height: 1.55; }
.extract-content p { margin: 0 0 14px; }
.extract-content p:last-child { margin-bottom: 0; }
.extract-content .extract-label {
  font-weight: 700;
  font-size: 14.5px;
  margin-bottom: 8px;
  display: block;
  color: var(--jk-navy);
}

/* Right pane: statements */
.em-instruction {
  font-size: 13.5px;
  font-weight: 500;
  margin-bottom: 8px;
  line-height: 1.5;
}
.em-instruction.bold {
  font-weight: 700;
  margin-top: 8px;
  margin-bottom: 14px;
  font-size: 14.5px;
}
.em-statements { display: flex; flex-direction: column; }
.em-statement-row {
  display: grid;
  grid-template-columns: 30px 1fr 90px;

  align-items: flex-start;

}
.em-statement-row:last-child { border-bottom: none; }
.em-statement-num {
  font-weight: 700;
  color: var(--jk-navy);
  padding-top: 8px;

}
.em-statement-text {
  font-size: 13px;
  line-height: 1.45;
  padding-top: 4px;
}
.em-select { position: relative; }
.em-select select {
  font-family: inherit;
  font-size: 14px;
  padding: 7px 28px 7px 12px;
  border: 1.5px solid #5a5a5a;
  border-radius: 2px;
  background: #fff;
  appearance: none;
  -webkit-appearance: none;
  width: 100%;
  height: 34px;
  cursor: pointer;
  font-weight: 500;
}
.em-select::after {
  content: "";
  position: absolute;
  right: 10px; top: 50%;

  width: 0; height: 0;

  border-right: 5px solid transparent;

  display: flex; align-items: stretch;

  font-size: 16px; font-weight: 600;

.btn-back, .btn-submit {

.btn-back:hover, .btn-submit:hover { background: var(--jk-navy-dark); }

.btn-submit { margin-left: auto; }

.cover-actions button:hover { background: var(--jk-navy-dark); }
.cover-actions button.secondary { background: #e5e8ec; color: #1a1a1a; }

.name-input {

.modal-bg {

.modal-card {

  padding: 30px 36px; max-width: 480px;

.modal-card.warning { border-color: var(--flag-orange); }

.score-display .score { font-size: 60px; font-weight: 700; color: var(--jk-navy); line-height: 1; }

.score-time { font-size: 13px; color: #666; margin-bottom: 24px; }
.results-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.results-actions button {

.review-banner {

.review-banner .info { display: flex; gap: 18px; align-items: center; }
.review-banner .badge {

}
.review-banner button {

}
.review-banner button:hover { background: rgba(255,255,255,0.28); }

/* Review row coloring */
.em-statement-row.review-correct {
  background: #f0fdf4;
  border-left: 4px solid var(--correct-green);
  padding-left: 8px;
}
.em-statement-row.review-wrong {
  background: #fef2f2;
  border-left: 4px solid var(--wrong-red);
  padding-left: 8px;
}
.em-statement-row.review-unanswered {
  background: #f9fafb;
  border-left: 4px solid #9ca3af;
  padding-left: 8px;
}
.review-status-badge {
  font-size: 11px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 10px;
  margin-top: 6px;
  display: inline-block;
}
.review-status-badge.correct { background: var(--correct-green); color: #fff; }
.review-status-badge.wrong { background: var(--wrong-red); color: #fff; }
.review-status-badge.unanswered { background: #6b7280; color: #fff; }
.em-correct-display {
  font-size: 12px;
  font-weight: 700;
  color: var(--correct-green);
  margin-top: 4px;
  text-align: right;
}
.em-correct-display .label-arrow { color: #6b7280; font-weight: 500; }

.solution-toggle-btn {
  background: var(--jk-gold); color: #1a1a1a;
  font-weight: 700; padding: 7px 12px;
  font-size: 12px; border-radius: 3px;
  margin-top: 6px;
}
.solution-toggle-btn:hover { background: #b89348; }
.solution-panel {
  margin-top: 8px;
  background: #fffbeb;
  border: 1px solid var(--jk-gold);
  border-radius: 4px;
  padding: 10px 12px;
  font-size: 12.5px;
  line-height: 1.55;
  grid-column: 1 / -1;
}
.solution-panel h4 {
  font-size: 11px; font-weight: 700;

@media (max-width: 900px) {
  .pane-left, .pane-right { padding: 16px 16px; }
  .center-cluster { min-width: 200px; padding: 8px 14px; }
  .center-cluster .q-title { font-size: 14px; }
  .top-bar { height: 64px; }
  .timer-digits .num { font-size: 20px; }
  .jk-logo .text { display: none; }
  .em-statement-row { grid-template-columns: 24px 1fr 80px; }
}
</style>

<div id="app"></div>
<script>
const GOOGLE_SHEETS_URL = '';

const TEST_META = {
  testId: 'TestDay-Extract-Kindness',
  title: 'Multiple Extracts',
  topic: 'Kindness',
  durationSeconds: 780,  // 13 minutes
  totalQuestions: 10
};

const PASSAGE = {
  theme: 'kindness',
  extracts: [
    {
      letter: 'A',
      label: 'Extract A',
      html: `<span class="extract-label">Extract A</span>
<p>I started at a new high school in Year 7, in a town where my family had moved at the start of the summer. I knew nobody. The first week was the longest week of my life. I sat by myself at lunch on the first day, and on the second, and on the third, behind the canteen where I thought the older students could not see me. I had decided, by Wednesday morning, that this was simply going to be how the next year went.</p>
<p>On Wednesday at lunchtime a girl named Ruby came around the corner with her sandwich and sat down on the bench next to me without asking. She did not say anything dramatic. She offered me half a chocolate muffin and we ate in companionable silence. She got up when the bell went and said, 'Same time tomorrow?' We did not become best friends that year, or indeed ever. We were friendly but not close. What changed was not my social position. What changed was the inside of my head. Knowing one person at this school had bothered to notice me, even for the length of one lunch, made the rest of the year a different kind of place. The loneliness did not entirely go away, but it stopped being the only thing in the room.</p>`
    },
    {
      letter: 'B',
      label: 'Extract B',
      html: `<span class="extract-label">Extract B</span>
<p>Mrs Henley was seventy-eight, and the number 472 was eleven minutes late. The young woman who arrived at the stop just after her had a baby in a pram, a folded stroller hanging from one shoulder, and a cardboard box that she was clearly struggling to keep balanced against her hip. Mrs Henley watched her for a moment, then stepped forward.</p>
<p>'Would you like me to hold the stroller for you for a minute?' she said. 'Just so you can put the box down.'</p>
<p>The young woman looked at her and, very briefly, her face did something complicated. Mrs Henley realised that she was not going to refuse the help, and that she was also not going to be able to thank her without crying. The young woman handed over the stroller, set the box down on the small concrete ledge of the shelter, and pretended to look at her phone for a long moment, while she worked out how to compose her face. Mrs Henley pretended not to notice. The bus, when it eventually arrived, was full. They both got on. Neither of them said anything more about the stroller. Mrs Henley thought, getting off two stops later, that she had not, in years, seen anyone so plainly worn out.</p>`
    },
    {
      letter: 'C',
      label: 'Extract C',
      html: `<span class="extract-label">Extract C</span>
<p>The work of the primatologist Frans de Waal, conducted at Emory University over four decades, has fundamentally altered our understanding of where helpful behaviour comes from. In one well-known experiment, capuchin monkeys housed in adjacent enclosures were given access to apple slices, with the catch that one monkey had to choose between two tokens — one that fed both monkeys, and one that fed only itself. Capuchins, given the choice, repeatedly selected the token that fed their neighbour as well, even when it offered no advantage to themselves.</p>
<p>Bonobos, our closest living relatives, have been observed approaching distressed members of their group and providing what looks unmistakably like comfort — embracing, grooming, sitting in close proximity until the distressed individual appears calmer. These behaviours occur in primates that have no human language, no formal moral instruction, and no shared culture in the human sense. They emerge spontaneously, in social situations that resemble the ones our ancestors would have lived in long before our species existed. The implication is significant. The capacity for kindness, in some basic form, appears to be older than humanity itself, and may be part of the social equipment we inherited rather than something we invented.</p>`
    },
    {
      letter: 'D',
      label: 'Extract D',
      html: `<span class="extract-label">Extract D</span>
<p>There is a particular framing of kindness, common in certain books about leadership and certain corners of online culture, that treats it as a kind of soft option — the path of least resistance, the response of someone who has not yet developed the spine for harder forms of engagement. I want to suggest, with some force, that this gets the picture nearly backwards.</p>
<p>Indifference is the easy choice. It costs nothing. It requires no attention to the other person, no consideration of their situation, no exposure of one's own concern. It is what happens by default when a person decides not to be involved. Real kindness, by contrast, is often demanding. The colleague who tells a junior staff member that the report is not yet good enough — and explains why, and helps them improve it — is doing something kinder, and considerably harder, than the colleague who waves it through to avoid an awkward conversation.</p>
<p>The same is true of holding firm boundaries with people one cares about, of telling difficult truths, of being honest about disappointment. These are not the absence of kindness. They are kindness exercised in conditions where indifference would be much easier. What gets called weakness in the kind person is, more often, the willingness to remain involved in situations where staying detached would cost less.</p>`
    }
  ]
};

const STATEMENTS = [
  { qNum: 21, text: 'describes feeling alone before someone made an effort?', correct: 'A',
    solution: { evidence: "Extract A describes the writer alone for the first three days at a new school — 'I sat by myself at lunch on the first day, and on the second, and on the third' — before Ruby came around the corner on Wednesday and sat down. Loneliness preceded someone making an effort.",
      whyNot: "LOW distance — direct content match. Other extracts do not describe a period of loneliness preceding a kind act." } },
  { qNum: 22, text: 'argues that being warm in hard moments demands more than detachment?', correct: 'D',
    solution: { evidence: "Extract D argues that 'real kindness, by contrast, is often demanding' and that the colleague who gives honest feedback 'is doing something kinder, and considerably harder, than the colleague who waves it through.' Being warm in hard moments takes more than detachment.",
      whyNot: "<strong>C</strong> also describes kindness in animals but offers no comparison with detachment. The stem 'in hard moments' anchors uniquely in D's specific examples (firm boundaries, difficult truths, disappointment)." } },
  { qNum: 23, text: 'describes a small act of help offered to a stranger?', correct: 'B',
    solution: { evidence: "Extract B: Mrs Henley 'stepped forward' and said, 'Would you like me to hold the stroller for you for a minute?' A small offer of help to someone she had not previously met.",
      whyNot: "LOW distance — direct content match. Extract A's Ruby is also a stranger initially but is part of the writer's school community, not an offer of physical help." } },
  { qNum: 24, text: 'explains that helpful behaviour appears in animals close to humans?', correct: 'C',
    solution: { evidence: "Extract C describes capuchin monkeys sharing apple slices and bonobos comforting distressed group members. Both species are primates — animals close to humans. Helpful behaviour appears in these animals.",
      whyNot: "<strong>A</strong> and <strong>B</strong> describe humans helping humans. The stem 'animals close to humans' anchors uniquely in C's primate research (capuchins, bonobos)." } },
  { qNum: 25, text: 'suggests that telling someone an unwelcome truth can itself be kind?', correct: 'D',
    solution: { evidence: "Extract D: telling a junior 'the report is not yet good enough' is described as kinder than waving it through; and 'telling difficult truths' is 'kindness exercised in conditions where indifference would be much easier.' Telling unwelcome truths can itself be a form of kindness.",
      whyNot: "HIGH distance. <strong>A</strong> involves Ruby's quiet kindness but no truth-telling. The stem 'unwelcome truth... can itself be kind' anchors uniquely in D's feedback example." } },
  { qNum: 26, text: 'depicts a single act that changed how a longer period felt?', correct: 'A',
    solution: { evidence: "Extract A: Ruby's one lunch on Wednesday — 'half a chocolate muffin' eaten in 'companionable silence' — is described as having 'made the rest of the year a different kind of place.' One brief act changed how the writer experienced months of school afterwards.",
      whyNot: "<strong>B</strong>'s bus stop kindness is a single act but is not described as changing a longer period. The stem 'changed how a longer period felt' anchors in A's year-shaping moment." } },
  { qNum: 27, text: 'explains that a behaviour exists in species that do not speak?', correct: 'C',
    solution: { evidence: "Extract C: 'these behaviours occur in primates that have no human language, no formal moral instruction, and no shared culture.' The kind behaviour exists in species that do not have language.",
      whyNot: "Other extracts describe humans (who speak). The stem 'species that do not speak' anchors uniquely in C's no-language primates." } },
  { qNum: 28, text: 'shows someone receiving help moved by what was not said?', correct: 'B',
    solution: { evidence: "Extract B: Mrs Henley offers to hold the stroller; the young woman is unable to thank her without crying; Mrs Henley pretends not to notice while the woman recovers; 'neither of them said anything more about the stroller.' The young woman is moved by the kindness; what moves her further is that nothing is said about her response.",
      whyNot: "HIGH distance. <strong>A</strong>'s Ruby is also quiet, but A is told from the perspective of the receiver of routine company, not someone overcome at the moment of help. The stem 'moved by what was not said' anchors in B's silent dignity-preservation." } },
  { qNum: 29, text: "recalls realising one person's notice made an isolated time bearable?", correct: 'A',
    solution: { evidence: "Extract A: 'knowing one person at this school had bothered to notice me, even for the length of one lunch, made the rest of the year a different kind of place. The loneliness did not entirely go away, but it stopped being the only thing in the room.' One person's notice made the isolated time bearable.",
      whyNot: "The stem 'isolated time bearable' targets A's specific shift from loneliness as 'the only thing in the room' to something less totalising." } },
  { qNum: 30, text: 'implies that indifference is sometimes confused with strength?', correct: 'D',
    solution: { evidence: "Extract D: 'indifference is the easy choice. It costs nothing'; and the closing line — 'what gets called weakness in the kind person is, more often, the willingness to remain involved in situations where staying detached would cost less.' Indifference is being mistaken for strength.",
      whyNot: "HIGH distance. <strong>C</strong> describes biological origins of kindness but offers no claim about indifference being misread. The stem 'indifference confused with strength' anchors in D's cultural argument." } }
];

const STATE = {
  screen: 'name',
  studentName: '',
  startedAt: null,
  finishedAt: null,
  timerSeconds: TEST_META.durationSeconds,
  timerHidden: false,
  activeExtractIndex: 0,
  // answers[qNum] = letter (A/B/C/D)
  answers: {},
  showSolution: {},
  uploadStatus: 'pending'
};

let timerInterval = null;
const root = document.getElementById('app');

function render() {
  switch (STATE.screen) {
    case 'name': renderNameEntry(); break;
    case 'confirm': renderConfirm(); break;
    case 'test': renderTest(); break;
    case 'submitConfirm': renderTest(); renderSubmitModal(); break;
    case 'timeUp': renderTest(); renderTimeUpModal(); break;
    case 'submitted': renderResults(); break;
    case 'review': renderReview(); break;
  }
}

function jkLogo() {
  return `<div class="jk-logo">
    <div class="mark">JK</div>
    <div class="text">
      <span class="l1">JK COACHING</span>
      <span class="l2">COLLEGE</span>
    </div>
  </div>`;
}

function topBar() {
  let timerCls = '';
  if (STATE.timerSeconds <= 60) timerCls = 'danger';
  else if (STATE.timerSeconds <= 180) timerCls = 'warning';
  return `<div class="top-bar">
    <div class="left-cluster">
      <button class="zoom-btn" onclick="zoomToggle()">+</button>
      <div class="timer-block ${timerCls}">
        <div class="timer-digits" style="${STATE.timerHidden ? 'visibility:hidden' : ''}">${formatTimer()}</div>
        ${STATE.timerHidden ? '' : `<div class="timer-labels"><span>Hours</span><span>Mins</span><span>Secs</span></div>`}
      </div>
      <button class="hide-time-btn" onclick="toggleHideTime()">${STATE.timerHidden ? 'Show time' : 'Hide time'}</button>
    </div>
    <div class="center-cluster"><span class="q-title">${TEST_META.title} · Q21–30</span></div>
    <div class="right-cluster">${jkLogo()}</div>
  </div>`;
}

function topBarSimple(text) {
  return `<div class="top-bar">
    <div class="left-cluster"><button class="zoom-btn">+</button></div>
    <div class="center-cluster"><span class="q-title">${text}</span></div>
    <div class="right-cluster">${jkLogo()}</div>
  </div>`;
}

function renderNameEntry() {
  root.innerHTML = `
    ${topBarSimple(TEST_META.title + ' · Theme: ' + TEST_META.topic)}
    <div class="cover-screen">
      <div class="cover-card">
        <div class="brand-mark">JK</div>
        <h1>JK Coaching College</h1>
        <div class="subtitle">${TEST_META.title} — Theme: ${TEST_META.topic}</div>
        <div class="question">Please enter your name to begin</div>
        <div class="sub">
          You will have <strong>13 minutes</strong> to read four short extracts on the theme of kindness
          and answer 10 questions (Q21–30). For each question, choose the option (A, B, C or D)
          which you think best answers the question. Extracts may be used more than once.
        </div>
        <input type="text" class="name-input" id="nameInput" placeholder="e.g. Sarah Kim"
               value="${escapeHtml(STATE.studentName)}"
               oninput="STATE.studentName = this.value; document.getElementById('startBtn').disabled = !this.value.trim();"
               onkeypress="if(event.key === 'Enter' && this.value.trim()) goConfirm()">
        <div class="name-hint">${TEST_META.totalQuestions} questions · 13 minutes</div>
        <div class="cover-actions">
          <button id="startBtn" ${STATE.studentName.trim() ? '' : 'disabled'} onclick="goConfirm()">Continue</button>
        </div>
        <a href="../" class="back-link">← Back to home</a>
      </div>
    </div>
  `;
  setTimeout(() => document.getElementById('nameInput')?.focus(), 50);
}

function renderConfirm() {
  root.innerHTML = `
    ${topBarSimple('')}
    <div class="cover-screen">
      <div class="cover-card">
        <div class="brand-mark">JK</div>
        <h1>${escapeHtml(STATE.studentName)}</h1>
        <div class="subtitle">${TEST_META.title} — Theme: ${TEST_META.topic}</div>
        <div class="question">Ready to begin?</div>
        <div class="sub">The timer (13 minutes) will start when you click Yes.<br>When time runs out the test is submitted automatically.</div>
        <div class="cover-actions">
          <button class="secondary" onclick="STATE.screen='name'; render();">No, go back</button>
          <button onclick="startTest()">Yes, start</button>
        </div>
      </div>
    </div>
  `;
}

function renderTest() {
  const extracts = PASSAGE.extracts;
  const activeIdx = Math.min(STATE.activeExtractIndex, extracts.length - 1);
  const activeExtract = extracts[activeIdx];

  const tabsHtml = `<div class="extract-tabs">
    ${extracts.map((ex, i) => `
      <button class="extract-tab ${activeIdx === i ? 'active' : ''}" onclick="setExtract(${i})">${ex.label}</button>
    `).join('')}
  </div>`;

  const stmtsHtml = STATEMENTS.map(st => {
    const sel = STATE.answers[st.qNum] || '';
    return `<div class="em-statement-row">
      <div class="em-statement-num">${st.qNum}.</div>
      <div class="em-statement-text">${st.text}</div>
      <div class="em-select">
        <select onchange="setAnswer(${st.qNum}, this.value)">
          <option value="" ${!sel ? 'selected' : ''}>—</option>
          <option value="A" ${sel === 'A' ? 'selected' : ''}>A</option>
          <option value="B" ${sel === 'B' ? 'selected' : ''}>B</option>
          <option value="C" ${sel === 'C' ? 'selected' : ''}>C</option>
          <option value="D" ${sel === 'D' ? 'selected' : ''}>D</option>
        </select>
      </div>
    </div>`;
  }).join('');

  root.innerHTML = `
    ${topBar()}
    <div class="content">
      <div class="pane-left">
        ${tabsHtml}
        <div class="extract-instruction">Read the four extracts below on the theme of <strong>kindness</strong>.</div>
        <div class="extract-content">${activeExtract.html}</div>
      </div>
      <div class="pane-right">
        <div class="em-instruction">For questions 21–30, choose the option (A, B, C or D) which you think best answers the question. An extract may be used more than once.</div>
        <div class="em-instruction bold">Which writer…</div>
        <div class="em-statements">${stmtsHtml}</div>
      </div>
    </div>
    <div class="bottom-bar">
      <button class="btn btn-back" onclick="goHome()">← Home</button>
      <button class="btn btn-submit" onclick="goSubmit()">Submit ▸</button>
    </div>
  `;
}

function renderSubmitModal() {
  const unanswered = STATEMENTS.filter(s => !STATE.answers[s.qNum]).length;
  const modal = document.createElement('div');
  modal.className = 'modal-bg';
  modal.id = 'submitModal';
  modal.innerHTML = `
    <div class="modal-card">
      <h2>Submit your test?</h2>
      <p>${unanswered > 0 ? `You have <strong>${unanswered}</strong> unanswered question${unanswered > 1 ? 's' : ''}.` : 'You have answered all questions.'}<br>
      Once submitted, you cannot change your answers.</p>
      <div class="modal-actions">
        <button class="secondary" onclick="cancelSubmit()">Cancel</button>
        <button onclick="finalizeSubmit()">Submit</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
}

function renderTimeUpModal() {
  const modal = document.createElement('div');
  modal.className = 'modal-bg';
  modal.id = 'timeUpModal';
  modal.innerHTML = `
    <div class="modal-card warning">
      <h2>⏰ Time's up!</h2>
      <p>The 13 minutes are over. Your test will be submitted automatically.</p>
      <div class="modal-actions">
        <button onclick="finalizeSubmit()">View Results</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
}

function renderResults() {
  const score = computeScore();
  const elapsed = Math.floor((STATE.finishedAt - STATE.startedAt) / 1000);
  const min = Math.floor(elapsed / 60);
  const sec = elapsed % 60;
  const pct = Math.round((score.correct / score.total) * 100);

  let uploadHtml = '';
  if (STATE.uploadStatus === 'pending') uploadHtml = `<div class="upload-status">Saving results to teacher dashboard…</div>`;
  else if (STATE.uploadStatus === 'success') uploadHtml = `<div class="upload-status success">✓ Results saved to teacher dashboard</div>`;
  else if (STATE.uploadStatus === 'error') uploadHtml = `<div class="upload-status error">Could not save automatically. Please notify your teacher of your score.</div>`;

  root.innerHTML = `
    ${topBarSimple('Test Complete')}
    <div class="results-screen">
      <div class="results-card">
        <h1>Well Done!</h1>
        <div class="student-line"><strong>${escapeHtml(STATE.studentName)}</strong> · ${TEST_META.title} · ${TEST_META.topic}</div>
        <div class="score-display">
          <span class="score">${score.correct}</span>
          <span class="total">/ ${score.total}</span>
        </div>
        <div class="score-pct">${pct}%</div>
        <div class="score-time">Time taken: ${min}m ${sec}s</div>
        <div class="results-actions">
          <button onclick="goReview()">Review Answers</button>
          <button class="secondary" onclick="restartTest()">Restart</button>
          <button class="secondary" onclick="goHome()">Home</button>
        </div>
        ${uploadHtml}
      </div>
    </div>
  `;
}

function renderReview() {
  const extracts = PASSAGE.extracts;
  const activeIdx = Math.min(STATE.activeExtractIndex, extracts.length - 1);
  const activeExtract = extracts[activeIdx];

  const tabsHtml = `<div class="extract-tabs">
    ${extracts.map((ex, i) => `
      <button class="extract-tab ${activeIdx === i ? 'active' : ''}" onclick="setExtract(${i})">${ex.label}</button>
    `).join('')}
  </div>`;

  const stmtsHtml = STATEMENTS.map(st => {
    const userAns = STATE.answers[st.qNum];
    const correctAns = st.correct;
    const isCorrect = userAns === correctAns;

    let rowCls, statusBadge;
    if (!userAns) {
      rowCls = 'review-unanswered';
      statusBadge = `<span class="review-status-badge unanswered">—</span>`;
    } else if (isCorrect) {
      rowCls = 'review-correct';
      statusBadge = `<span class="review-status-badge correct">✓ ${userAns}</span>`;
    } else {
      rowCls = 'review-wrong';
      statusBadge = `<span class="review-status-badge wrong">✕ ${userAns}</span>`;
    }

    const isOpen = STATE.showSolution[st.qNum];
    const correctDisplay = !isCorrect
      ? `<div class="em-correct-display"><span class="label-arrow">→ Correct: </span>${correctAns}</div>`
      : '';

    return `<div class="em-statement-row ${rowCls}">
      <div class="em-statement-num">${st.qNum}.</div>
      <div class="em-statement-text">
        ${st.text}
        ${statusBadge}
        ${correctDisplay}
        <button class="solution-toggle-btn" onclick="toggleSolution(${st.qNum})">
          ${isOpen ? '▲ Hide' : '💡 Solution'}
        </button>
      </div>
      <div></div>
      ${isOpen ? `<div class="solution-panel">
        <h4>Why ${correctAns} is correct</h4>
        <div>${st.solution.evidence}</div>
        ${st.solution.whyNot ? `<h4 style="margin-top:8px;">Why not the others</h4><div class="why-not">${st.solution.whyNot}</div>` : ''}
      </div>` : ''}
    </div>`;
  }).join('');

  const score = computeScore();

  root.innerHTML = `
    <div class="review-banner">
      <div class="info">
        <span>Reviewing</span>
        <span class="badge">${score.correct} / ${score.total}</span>
      </div>
      <div><button onclick="exitReview()">← Back to Results</button></div>
    </div>
    <div class="content">
      <div class="pane-left">
        ${tabsHtml}
        <div class="extract-instruction">Read the four extracts below on the theme of <strong>kindness</strong>.</div>
        <div class="extract-content">${activeExtract.html}</div>
      </div>
      <div class="pane-right">
        <div class="em-instruction bold">Review — Q21–Q30</div>
        <div class="em-statements">${stmtsHtml}</div>
      </div>
    </div>
  `;
}

/* HANDLERS */
function setExtract(i) { STATE.activeExtractIndex = i; render(); }
function setAnswer(qNum, value) {
  if (!value) {
    delete STATE.answers[qNum];
  } else {
    STATE.answers[qNum] = value;
  }
  // No re-render — preserve dropdown state. Just save.
}

function goConfirm() { if (!STATE.studentName.trim()) return; STATE.screen = 'confirm'; render(); }
function startTest() {
  STATE.screen = 'test';
  STATE.startedAt = Date.now();
  startTimer();
  render();
}
function goSubmit() { STATE.screen = 'submitConfirm'; render(); }
function cancelSubmit() {
  STATE.screen = 'test';
  document.getElementById('submitModal')?.remove();
}
function finalizeSubmit() {
  stopTimer();
  STATE.finishedAt = Date.now();
  STATE.screen = 'submitted';
  document.getElementById('submitModal')?.remove();
  document.getElementById('timeUpModal')?.remove();
  uploadResults();
  render();
}
function goReview() { STATE.screen = 'review'; render(); }
function exitReview() { STATE.screen = 'submitted'; render(); }
function toggleSolution(qNum) {
  STATE.showSolution[qNum] = !STATE.showSolution[qNum];
  render();
}
function restartTest() {
  if (!confirm('Restart the test? All answers will be cleared.')) return;
  STATE.screen = 'name';
  STATE.studentName = '';
  STATE.timerSeconds = TEST_META.durationSeconds;
  STATE.timerHidden = false;
  STATE.activeExtractIndex = 0;
  STATE.answers = {};
  STATE.showSolution = {};
  STATE.uploadStatus = 'pending';
  STATE.startedAt = null;
  STATE.finishedAt = null;
  stopTimer();
  render();
}
function goHome() {
  if (STATE.screen === 'test' && Object.keys(STATE.answers).length > 0) {
    if (!confirm('Leave the test? Your progress will be lost.')) return;
  }
  window.location.href = '../';
}

function startTimer() {
  stopTimer();
  timerInterval = setInterval(() => {
    STATE.timerSeconds--;
    if (STATE.timerSeconds <= 0) {
      stopTimer();
      STATE.timerSeconds = 0;
      STATE.screen = 'timeUp';
      render();
      return;
    }
    updateTimerDisplay();
  }, 1000);
}
function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }
function updateTimerDisplay() {
  const el = document.querySelector('.timer-digits');
  if (el) el.innerHTML = formatTimer();
  const block = document.querySelector('.timer-block');
  if (block) {
    block.classList.remove('warning', 'danger');
    if (STATE.timerSeconds <= 60) block.classList.add('danger');
    else if (STATE.timerSeconds <= 180) block.classList.add('warning');
  }
}
function formatTimer() {
  const h = Math.floor(STATE.timerSeconds / 3600);
  const m = Math.floor((STATE.timerSeconds % 3600) / 60);
  const s = STATE.timerSeconds % 60;
  const pad = n => String(n).padStart(2, '0');
  return `<span class="num">${pad(h)}</span><span class="colon">:</span><span class="num">${pad(m)}</span><span class="colon">:</span><span class="num">${pad(s)}</span>`;
}
function toggleHideTime() { STATE.timerHidden = !STATE.timerHidden; render(); }
function zoomToggle() {
  const cur = parseFloat(document.body.style.zoom || '1');
  document.body.style.zoom = cur >= 1.2 ? '1' : (cur + 0.1).toFixed(1);
}

function computeScore() {
  let correct = 0;
  STATEMENTS.forEach(s => { if (STATE.answers[s.qNum] === s.correct) correct++; });
  return { correct, total: STATEMENTS.length };
}

function uploadResults() {
  if (!GOOGLE_SHEETS_URL) {
    STATE.uploadStatus = 'disabled';
    return;
  }
  const score = computeScore();
  const elapsed = Math.floor((STATE.finishedAt - STATE.startedAt) / 1000);
  const answersStr = STATEMENTS.map(s => {
    const u = STATE.answers[s.qNum] || '-';
    return `Q${s.qNum}:${u}(${s.correct})`;
  }).join(' | ');

  const payload = {
    studentName: STATE.studentName,
    setName: TEST_META.testId,
    timestamp: new Date().toISOString(),
    timestampLocal: new Date().toLocaleString('en-AU', { timeZone: 'Australia/Sydney' }),
    totalScore: score.correct,
    totalPossible: score.total,
    percentage: Math.round((score.correct / score.total) * 100),
    timeTakenSeconds: elapsed,
    timeTakenFormatted: `${Math.floor(elapsed/60)}m ${elapsed%60}s`,
    sectionA: '-', sectionB: '-', sectionC: '-', sectionD: '-', sectionE: '-',
    answers: answersStr
  };

  STATE.uploadStatus = 'pending';
  render();

  fetch(GOOGLE_SHEETS_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(payload)
  }).then(() => {
    STATE.uploadStatus = 'success';
    if (STATE.screen === 'submitted') render();
  }).catch(() => {
    STATE.uploadStatus = 'error';
    if (STATE.screen === 'submitted') render();
  });
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"
  }[c]));
}

render();
</script>
</body>
</html>
